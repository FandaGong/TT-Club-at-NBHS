<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="NBHS Table Tennis">
  <!-- Club-red rounded tile for a strong, recognisable silhouette -->
  <rect width="64" height="64" rx="12" fill="#991b1b"/>

  <!-- Big bold paddle, minimal detail so it reads at tiny sizes -->
  <g transform="rotate(-28 30 32)">
    <!-- blade -->
    <circle cx="30" cy="26" r="17" fill="#ffffff"/>
    <!-- rubber -->
    <circle cx="30" cy="26" r="11.5" fill="#111111"/>
    <!-- handle -->
    <rect x="25.5" y="40" width="9" height="19" rx="4" fill="#ffffff"/>
  </g>

  <!-- Ball: large, solid, high contrast in the corner -->
  <circle cx="49" cy="16" r="8" fill="#facc15"/>
  <circle cx="49" cy="16" r="8" fill="none" stroke="#111111" stroke-width="2"/>
</svg>
