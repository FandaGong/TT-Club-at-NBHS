<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - NBHS Table Tennis</title>
    <script src="tailwind-theme.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="styles.css?v=20260705h">
    <link rel="stylesheet" href="animations.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="icon" type="image/png" href="favicon.png">
</head>
<body class="site-surface text-slate-900 font-sans min-h-screen flex flex-col">
    <div id="header-placeholder"></div>

    <main id="main-content" class="almanac flex-grow w-full opacity-0 transition-opacity duration-500">
      <div class="alm-shell">
        <header class="alm-masthead--compact alm-block" style="border-bottom:2px solid var(--ink);padding-bottom:1.25rem;">
            <div>
                <p class="alm-kicker">Accessibility &amp; Display</p>
                <h1 class="alm-display alm-display--md mt-3">Settings</h1>
                <p class="alm-lede mt-3">Adjust the site appearance to suit your viewing comfort.</p>
            </div>
        </header>

        <section class="alm-block grid gap-6 lg:grid-cols-[1.2fr_0.8fr]">
            <div class="alm-panel">
                <div class="alm-rule-head"><h2 class="alm-section-title" style="font-size:1.3rem;">Appearance</h2></div>
                <div class="space-y-5 mt-2">
                    <div>
                        <label class="alm-field-label" for="themeSelect">Theme</label>
                        <select id="themeSelect" class="alm-select">
                            <option value="light">Light mode</option>
                            <option value="dark">Dark mode</option>
                            <option value="high-contrast">High contrast</option>
                        </select>
                    </div>

                    <div>
                        <label class="alm-field-label" for="navLayoutSelect">Navigation layout</label>
                        <select id="navLayoutSelect" class="alm-select">
                            <option value="top">Top bar</option>
                            <option value="sidebar">Sidebar</option>
                        </select>
                    </div>

                    <div>
                        <label class="alm-field-label" for="accentSelect">Accent color</label>
                        <select id="accentSelect" class="alm-select">
                            <option value="red">Red</option>
                            <option value="blue">Blue</option>
                            <option value="green">Green</option>
                            <option value="orange">Orange</option>
                        </select>
                    </div>

                    <div>
                        <label class="alm-field-label" for="fontSelect">Font style</label>
                        <select id="fontSelect" class="alm-select">
                            <option value="sans">Default sans</option>
                            <option value="serif">Readable serif</option>
                            <option value="mono">Compact mono</option>
                        </select>
                    </div>

                    <div>
                        <label class="alm-field-label" for="densitySelect">Layout density</label>
                        <select id="densitySelect" class="alm-select">
                            <option value="comfortable">Comfortable</option>
                            <option value="compact">Compact</option>
                            <option value="spacious">Spacious</option>
                        </select>
                    </div>

                    <div class="flex items-center justify-between" style="border:1px solid var(--rule-strong);padding:0.75rem 0.9rem;">
                        <label class="alm-field-label" for="reducedMotionToggle" style="margin-bottom:0;">Reduce motion</label>
                        <input id="reducedMotionToggle" type="checkbox" class="h-5 w-5" style="accent-color:var(--oxblood);">
                    </div>

                    <div>
                        <label class="alm-field-label" for="contrastRange">Contrast</label>
                        <input id="contrastRange" type="range" min="0.8" max="1.4" step="0.05" value="1" class="w-full" style="accent-color:var(--oxblood);">
                        <p id="contrastValue" class="alm-mh-date">1.00×</p>
                    </div>

                    <div>
                        <label class="alm-field-label" for="scaleRange">Scale</label>
                        <input id="scaleRange" type="range" min="0.9" max="1.3" step="0.05" value="1" class="w-full" style="accent-color:var(--oxblood);">
                        <p id="scaleValue" class="alm-mh-date">1.00×</p>
                    </div>
                </div>
            </div>

            <aside class="alm-panel" style="align-self:start;">
                <div class="alm-rule-head"><h3 class="alm-section-title" style="font-size:1.1rem;">Preview</h3></div>
                <div class="preview-card rounded-none border p-4 space-y-3" style="margin-top:0.5rem;">
                    <div class="preview-heading font-semibold">Sample heading</div>
                    <p class="settings-help text-sm">This preview reflects your current display choices.</p>
                    <button class="preview-button px-4 py-2 font-semibold">Example button</button>
                </div>
            </aside>
        </section>
      </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="components.js?v=20260705g"></script>
    <script>
        window.manualPageReveal = true;

        function applySettings() {
            window.applySiteSettings?.();

            const theme = localStorage.getItem('nbhs-theme') || 'light';
            const contrast = parseFloat(localStorage.getItem('nbhs-contrast') || '1');
            const scale = parseFloat(localStorage.getItem('nbhs-scale') || '1');
            const accent = localStorage.getItem('nbhs-accent') || 'red';
            const font = localStorage.getItem('nbhs-font') || 'sans';
            const density = localStorage.getItem('nbhs-density') || 'comfortable';
            const reducedMotion = localStorage.getItem('nbhs-reduced-motion') === 'true';
            const navLayout = localStorage.getItem('nbhs-nav-layout') || 'top';

            const themeSelect = document.getElementById('themeSelect');
            const accentSelect = document.getElementById('accentSelect');
            const fontSelect = document.getElementById('fontSelect');
            const densitySelect = document.getElementById('densitySelect');
            const navLayoutSelect = document.getElementById('navLayoutSelect');
            const reducedMotionToggle = document.getElementById('reducedMotionToggle');
            const contrastRange = document.getElementById('contrastRange');
            const scaleRange = document.getElementById('scaleRange');
            const contrastValue = document.getElementById('contrastValue');
            const scaleValue = document.getElementById('scaleValue');

            if (themeSelect) themeSelect.value = theme;
            if (accentSelect) accentSelect.value = accent;
            if (fontSelect) fontSelect.value = font;
            if (densitySelect) densitySelect.value = density;
            if (navLayoutSelect) navLayoutSelect.value = navLayout;
            if (reducedMotionToggle) reducedMotionToggle.checked = reducedMotion;
            if (contrastRange) contrastRange.value = contrast.toFixed(2);
            if (scaleRange) scaleRange.value = scale.toFixed(2);
            if (contrastValue) contrastValue.textContent = `${contrast.toFixed(2)}×`;
            if (scaleValue) scaleValue.textContent = `${scale.toFixed(2)}×`;
        }

        function saveSetting(key, value) {
            window.saveSiteSetting?.(key, value);
            applySettings();
        }

        document.addEventListener('DOMContentLoaded', () => {
            applySettings();

            const themeSelect = document.getElementById('themeSelect');
            const accentSelect = document.getElementById('accentSelect');
            const fontSelect = document.getElementById('fontSelect');
            const densitySelect = document.getElementById('densitySelect');
            const navLayoutSelect = document.getElementById('navLayoutSelect');
            const reducedMotionToggle = document.getElementById('reducedMotionToggle');
            const contrastRange = document.getElementById('contrastRange');
            const scaleRange = document.getElementById('scaleRange');

            themeSelect?.addEventListener('change', (event) => saveSetting('nbhs-theme', event.target.value));
            navLayoutSelect?.addEventListener('change', (event) => saveSetting('nbhs-nav-layout', event.target.value));
            accentSelect?.addEventListener('change', (event) => saveSetting('nbhs-accent', event.target.value));
            fontSelect?.addEventListener('change', (event) => saveSetting('nbhs-font', event.target.value));
            densitySelect?.addEventListener('change', (event) => saveSetting('nbhs-density', event.target.value));
            reducedMotionToggle?.addEventListener('change', (event) => saveSetting('nbhs-reduced-motion', event.target.checked));
            contrastRange?.addEventListener('input', (event) => {
                const value = parseFloat(event.target.value);
                saveSetting('nbhs-contrast', value.toFixed(2));
            });
            scaleRange?.addEventListener('input', (event) => {
                const value = parseFloat(event.target.value);
                saveSetting('nbhs-scale', value.toFixed(2));
            });

            document.getElementById('main-content')?.classList.remove('opacity-0');
            document.getElementById('page-footer')?.classList.remove('opacity-0');
        });
    </script>
</body>
</html>
