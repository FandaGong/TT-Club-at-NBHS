<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player Rankings - NBHS Table Tennis</title>
    <script src="tailwind-theme.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="animations.css">
    <link rel="icon" type="image/png" href="favicon.png">
</head>

<!-- CHANGE 1: flex flex-col for sticky footer -->
<body class="bg-red-50 text-slate-900 font-sans min-h-screen flex flex-col">

    <div id="header-placeholder"></div>

    <main id="main-content" class="max-w-6xl mx-auto p-6 flex-grow w-full transition-opacity duration-300">
        <div class="mb-6 fade-up">
            <h1 class="text-4xl font-bold text-red-900">Player Rankings</h1>
            <p class="mt-2 text-slate-600">Live Elo leaderboard.</p>
        </div>

        <div class="overflow-x-auto rounded-3xl bg-white border border-slate-200 shadow-sm fade-up">
            <table class="min-w-full text-left">
                <thead class="bg-slate-100 text-slate-600 uppercase text-xs tracking-[0.16em]">
                    <tr>
                        <th class="px-4 py-4">Rank</th>
                        <th class="px-4 py-4">Player</th>
                        <th class="px-4 py-4 text-center">Wins</th>
                        <th class="px-4 py-4 text-center">Losses</th>
                        <th class="px-4 py-4 text-right">Elo</th>
                    </tr>
                </thead>
                <tbody id="ladder-table">
                    <tr>
                        <td colspan="5" class="p-10 text-center text-slate-500">Loading rankings…</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <div id="footer-placeholder"></div>

<script src="components.js"></script>
<script>
    const SUPABASE_URL = 'https://ngnkbfazhdedaqvxcphw.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5nbmtiZmF6aGRlZGFxdnhjcGh3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MTE5NDksImV4cCI6MjA5MzI4Nzk0OX0.F_S6ORkFe-SuJPybs7FEFH94E6U2hZ5ern4vrg4kMOk';

    // Data now comes from Supabase `player_rankings`
    const PLAYER_TAGS = {
        'jonathan zhao': ['Website Feature Dev', 'Club Runner'],
        'damon yuan': ['Club Runner'],
        'fanda gong': ['Club Runner', 'Main Owner'],
        'oscar pan': ['Coach'],
        'mr siu': ['Teacher Supervisor']
    };

    function getPlayerTags(name) {
        return PLAYER_TAGS[(name || '').trim().toLowerCase()] || [];
    }

    function renderPlayerTags(name) {
        return getPlayerTags(name).map(tag => `
            <span class="inline-flex items-center rounded-full bg-blue-50 px-2.5 py-0.5 text-[10px] font-bold uppercase tracking-wide text-blue-700">
                ${tag}
            </span>
        `).join('');
    }

        async function getSupabaseClient() {
            if (window._supabaseClient) return window._supabaseClient;
            if (window.supabase) {
                window._supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                return window._supabaseClient;
            }
            if (document.readyState === 'loading') await new Promise(resolve => document.addEventListener('DOMContentLoaded', resolve));
            if (window.supabase && !window._supabaseClient) {
                window._supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            }
            if (window._supabaseClient) return window._supabaseClient;
            return null;
        }

        function normalizeKey(value) {
            return (value || '').toLowerCase().replace(/[^a-z0-9]+/g, '');
        }

        function sortPlayers(rows) {
            return rows.slice().sort((a, b) => {
                const eloDiff = (b.elo || 0) - (a.elo || 0);
                if (eloDiff !== 0) return eloDiff;
                const aOscar = normalizeKey(a.name) === 'oscarpan';
                const bOscar = normalizeKey(b.name) === 'oscarpan';
                if (aOscar !== bOscar) return aOscar ? -1 : 1;
                return (a.name || '').localeCompare(b.name || '');
            });
        }

        async function loadRankings() {
            const mainContent = document.getElementById('main-content');
            const pageFooter = document.getElementById('page-footer');
            const ladderTable = document.getElementById('ladder-table');

            if (ladderTable) {
                ladderTable.innerHTML = `<tr><td colspan="5" class="p-10 text-center text-slate-500">Loading rankings...</td></tr>`;
            }

            try {
                const supabase = await getSupabaseClient();
                if (!supabase) throw new Error('Supabase client not available');
                const { data, error } = await supabase.from('player_rankings').select('name,elo,wins,losses').order('elo', { ascending: false });
                if (error) throw error;

                const players = sortPlayers((data || []).map(r => ({
                    name: r.name || 'Unknown',
                    elo: r.elo || 0,
                    wins: r.wins || 0,
                    losses: r.losses || 0
                })));

                ladderTable.innerHTML = players.map((p, i) => `
                <tr class="border-b hover:bg-slate-50 transition-colors">
                    <td class="p-4 text-slate-400 font-bold">#${i + 1}</td>
                    <td class="p-4 font-semibold text-slate-800">
                        <div class="flex flex-wrap items-center gap-2">
                            <a href="player-analysis.html?name=${encodeURIComponent(p.name)}" class="text-red-600 hover:underline">
                                ${p.name}
                            </a>
                            ${renderPlayerTags(p.name)}
                        </div>
                    </td>
                    <td class="p-4 text-center text-green-600 font-bold">${p.wins}</td>
                    <td class="p-4 text-center text-red-500 font-bold">${p.losses}</td>
                    <td class="p-4 text-right font-mono font-bold text-red-600">${p.elo}</td>
                </tr>
            `).join('');
            } catch (err) {
                console.error("Data error:", err);
                if (ladderTable) {
                    ladderTable.innerHTML = `<tr><td colspan="5" class="p-10 text-center text-red-500">Error loading data. Check your internet or Supabase configuration.</td></tr>`;
                }
            } finally {
                if (mainContent) mainContent.classList.remove('opacity-0');
                if (pageFooter) pageFooter.classList.remove('opacity-0');
            }
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', loadRankings);
        } else {
            loadRankings();
        }
</script>
</body>
</html>
