<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player Rankings - NBHS Table Tennis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/png" href="favicon.png">
</head>

<body class="bg-slate-50 text-slate-900 font-sans min-h-screen">

    <header class="bg-blue-800 text-white shadow-md">
        <nav class="max-w-4xl mx-auto flex items-center justify-between gap-4 px-4 py-4">
            <a href="index.html" class="text-xl font-bold">NBHS TT Hub</a>
            <button id="navToggle" type="button" class="sm:hidden inline-flex h-10 w-10 items-center justify-center rounded-xl border border-white/20 bg-blue-900/20 text-white hover:bg-blue-900/40" aria-label="Toggle navigation" onclick="document.getElementById('navLinks').classList.toggle('hidden')">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8h16M4 16h16" />
                </svg>
            </button>
            <div id="navLinks" class="hidden w-full flex-col gap-3 pt-4 sm:flex sm:w-auto sm:flex-row sm:items-center sm:pt-0">
                <a href="index.html" class="block hover:underline">Home</a>
                <a href="player-ranking.html" class="block font-bold border-b-2 border-white sm:border-none">Rankings</a>
                <a href="player-matchup-ladder.html" class="block hover:underline">Matchups</a>
                <a href="club-analytics.html" class="block hover:underline">Analytics</a>
                <a href="past-records.html" class="block hover:underline">Past Records</a>
            </div>
        </nav>
    </header>

    <div class="max-w-4xl mx-auto p-6">
        <h1 class="text-3xl font-bold text-blue-900 mb-6">Official Club Rankings</h1>

        <div class="bg-white rounded-2xl shadow-sm border overflow-x-auto">
            <table class="w-full min-w-max text-left">
                <thead class="bg-slate-100 border-b">
                    <tr>
                        <th class="p-4 w-16">Rank</th>
                        <th class="p-4">Player Name</th>
                        <th class="p-4 text-center">Wins</th>
                        <th class="p-4 text-center">Losses</th>
                        <th class="p-4 text-right">Elo</th>
                    </tr>
                </thead>
                <tbody id="ladder-table">
                    <tr>
                        <td colspan="5" class="p-10 text-center text-slate-400">Fetching live rankings...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // Use the CSV output link for your Players tab
        const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ_UHoHNgToKV4yCuB_M56029JuMrOYWN-VkyxDiWkwXHJI1hhRnon_GMnvgvmQeHmL4F0gxkVz7IMP/pub?gid=2082256240&single=true&output=csv";

        async function loadRankings() {
            try {
                function parseCsv(text) {
                    const rows = [];
                    let row = [];
                    let field = '';
                    let inQuotes = false;

                    for (let i = 0; i < text.length; i++) {
                        const char = text[i];
                        if (char === '"') {
                            if (inQuotes && text[i + 1] === '"') {
                                field += '"';
                                i++;
                            } else {
                                inQuotes = !inQuotes;
                            }
                        } else if (char === ',' && !inQuotes) {
                            row.push(field);
                            field = '';
                        } else if ((char === '\n' || char === '\r') && !inQuotes) {
                            if (char === '\r' && text[i + 1] === '\n') i++;
                            row.push(field);
                            field = '';
                            rows.push(row);
                            row = [];
                        } else {
                            field += char;
                        }
                    }

                    if (field !== '' || row.length > 0) {
                        row.push(field);
                        rows.push(row);
                    }

                    return rows;
                }

                const response = await fetch(SHEET_URL);
                const data = await response.text();

                const rows = parseCsv(data).filter(r => r.length > 0);
                const playerRows = rows.slice(1); // Skip header row

                const players = playerRows.map(cols => {
                    const rawElo = cols[1]?.replace(/"/g, '').replace(/,/g, '').trim();

                    return {
                        name: cols[0]?.replace(/"/g, '').trim() || "Unknown",
                        elo: parseInt(rawElo) || 0, // Now "1,338" becomes 1338
                        wins: parseInt(cols[2]?.trim()) || 0,
                        losses: parseInt(cols[3]?.trim()) || 0
                    };
                });

                // Sort High to Low by Elo
                players.sort((a, b) => b.elo - a.elo);

                const table = document.getElementById('ladder-table');
                table.innerHTML = players.map((p, i) => `
    <tr class="border-b hover:bg-blue-50 transition-colors">
        <td class="p-4 text-slate-400 font-bold">#${i + 1}</td>
        <td class="p-4 font-semibold text-slate-800">
            <a href="player-analysis.html?name=${encodeURIComponent(p.name)}" class="text-blue-600 hover:underline">
                ${p.name}
            </a>
        </td>
        <td class="p-4 text-center text-green-600 font-bold">${p.wins}</td>
        <td class="p-4 text-center text-red-500 font-bold">${p.losses}</td>
        <td class="p-4 text-right font-mono font-bold text-blue-600">${p.elo}</td>
    </tr>
`).join('');

            } catch (err) {
                console.error("Fetch error:", err);
                document.getElementById('ladder-table').innerHTML = `<tr><td colspan="5" class="p-10 text-center text-red-500">Error loading data. Check your internet or CSV link.</td></tr>`;
            }
        }

        // Call the function
        loadRankings();
    </script>
</body>

</html>
