<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rankings - NBHS Table Tennis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/png" href="favicon.png">
</head>
<body class="bg-slate-50 text-slate-900 font-sans min-h-screen">

    <header class="bg-blue-800 text-white p-4 shadow-md">
        <nav class="max-w-4xl mx-auto flex gap-6">
            <a href="index.html" class="hover:underline">Home</a>
            <a href="player-ranking.html" class="font-bold border-b-2 border-white">Rankings</a>
            <a href="player-matchup-ladder.html" class="hover:underline">Matchups</a>
        </nav>
    </header>

    <div class="max-w-4xl mx-auto p-6">
        <h1 class="text-3xl font-bold text-blue-900 mb-6">Official Club Rankings</h1>
        <div class="bg-white rounded-2xl shadow-sm border overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-slate-100 border-b">
                    <tr>
                        <th class="p-4 w-16">Rank</th>
                        <th class="p-4">Player Name</th>
                        <th class="p-4 text-center">Wins</th>
                        <th class="p-4 text-center">Losses</th>
                        <th class="p-4 text-right">Elo</th>
                    </tr>
                </thead>
                <tbody id="ladder-table">
                    <tr><td colspan="5" class="p-10 text-center text-slate-400">Loading live data...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ_UHoHNgToKV4yCuB_M56029JuMrOYWN-VkyxDiWkwXHJI1hhRnon_GMnvgvmQeHmL4F0gxkVz7IMP/pub?gid=2082256240&single=true&output=csv";
        async function loadRankings() {
            try {
                const response = await fetch(SHEET_URL);
                const data = await response.text();
                const rows = data.split('\n').map(r => r.trim()).filter(r => r.length > 0);
                const players = rows.slice(1).map(row => {
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    const clean = (v) => (v || "").replace(/"/g, '').replace(/,/g, '').trim();
                    return { name: clean(cols[0]), elo: parseInt(clean(cols[1])) || 0, wins: clean(cols[2]) || 0, losses: clean(cols[3]) || 0 };
                }).sort((a,b) => b.elo - a.elo);

                document.getElementById('ladder-table').innerHTML = players.map((p, i) => `
                    <tr class="border-b hover:bg-blue-50 transition-colors">
                        <td class="p-4 text-slate-400 font-bold">#${i + 1}</td>
                        <td class="p-4 font-semibold text-slate-800">${p.name}</td>
                        <td class="p-4 text-center text-green-600 font-bold">${p.wins}</td>
                        <td class="p-4 text-center text-red-500 font-bold">${p.losses}</td>
                        <td class="p-4 text-right font-mono font-bold text-blue-600">${p.elo}</td>
                    </tr>`).join('');
            } catch (e) { console.error(e); }
        }
        loadRankings();
    </script>
</body>
</html>
