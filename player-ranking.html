<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player Rankings - NBHS Table Tennis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/png" href="favicon.png">
</head>
<body class="bg-slate-50 text-slate-900 font-sans min-h-screen">

    <header class="bg-blue-800 text-white p-4 shadow-md">
        <nav class="max-w-4xl mx-auto flex gap-6">
            <a href="index.html" class="hover:underline">Home</a>
            <a href="player-ranking.html" class="font-bold border-b-2 border-white">Rankings</a>
            <a href="player-matchup-ladder.html" class="hover:underline">Matchups</a>
        </nav>
    </header>

    <div class="max-w-4xl mx-auto p-6">
        <h1 class="text-3xl font-bold text-blue-900 mb-6">Official Club Rankings</h1>
        
        <div class="bg-white rounded-2xl shadow-sm border overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-slate-100 border-b">
                    <tr>
                        <th class="p-4 w-16">Rank</th>
                        <th class="p-4">Player Name</th>
                        <th class="p-4 text-center">Wins</th>
                        <th class="p-4 text-center">Losses</th>
                        <th class="p-4 text-right">Elo</th>
                    </tr>
                </thead>
                <tbody id="ladder-table">
                    <tr><td colspan="5" class="p-10 text-center text-slate-400">Fetching live rankings...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // Use the CSV output link for your Players tab
        const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ_UHoHNgToKV4yCuB_M56029JuMrOYWN-VkyxDiWkwXHJI1hhRnon_GMnvgvmQeHmL4F0gxkVz7IMP/pub?gid=2082256240&single=true&output=csv";

        async function loadRankings() {
            try {
                const response = await fetch(SHEET_URL);
                const data = await response.text();
                
                // Split rows and filter empty lines
                const rows = data.split('\n').map(r => r.trim()).filter(r => r.length > 0);
                const playerRows = rows.slice(1); // Skip header row

const players = playerRows.map(row => {
    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
    
    // Clean the Elo string by removing commas
    const rawElo = cols[1]?.replace(/"/g, '').replace(/,/g, '').trim();
    
    return {
        name: cols[0]?.replace(/"/g, '').trim() || "Unknown",
        elo: parseInt(rawElo) || 0, // Now "1,338" becomes 1338
        wins: parseInt(cols[2]?.trim()) || 0,
        losses: parseInt(cols[3]?.trim()) || 0
    };
});

                // Sort High to Low by Elo
                players.sort((a, b) => b.elo - a.elo);

                const table = document.getElementById('ladder-table');
                table.innerHTML = players.map((p, i) => `
                    <tr class="border-b hover:bg-blue-50 transition-colors">
                        <td class="p-4 font-bold text-slate-400">#${i + 1}</td>
                        <td class="p-4 font-bold text-blue-900">${p.name}</td>
                        <td class="p-4 text-center text-green-600 font-semibold">${p.wins}</td>
                        <td class="p-4 text-center text-red-500 font-semibold">${p.losses}</td>
                        <td class="p-4 text-right font-mono font-bold text-blue-600">${p.elo}</td>
                    </tr>
                `).join('');

            } catch (err) {
                console.error("Fetch error:", err);
                document.getElementById('ladder-table').innerHTML = `<tr><td colspan="5" class="p-10 text-center text-red-500">Error loading data. Check your internet or CSV link.</td></tr>`;
            }
        }

        // Call the function
        loadRankings();
    </script>
</body>
</html>
