<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player Rankings - NBHS Table Tennis</title>
    <script src="tailwind-theme.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <link rel="stylesheet" href="styles.css?v=20260713m">
    <link rel="stylesheet" href="animations.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="icon" type="image/png" href="favicon.png">
</head>

<!-- CHANGE 1: flex flex-col for sticky footer -->
<body class="site-surface text-slate-900 font-sans min-h-screen flex flex-col">

    <div id="header-placeholder"></div>

    <main id="main-content" class="almanac flex-grow w-full transition-opacity duration-300">
      <div class="alm-shell">
        <header class="alm-masthead--compact alm-block" style="border-bottom:2px solid var(--ink);padding-bottom:1.25rem;">
            <div>
                <p class="alm-kicker">Season standings</p>
                <h1 class="alm-display alm-display--md mt-3">Ranking<br>Ladder</h1>
            </div>
            <div class="alm-masthead-meta" style="margin-top:0;border-top:none;padding-top:0;">
                <div class="alm-stat"><span id="meta-players" class="alm-stat-num">—</span><span class="alm-stat-label">Players</span></div>
                <div class="alm-stat"><span id="meta-top" class="alm-stat-num">—</span><span class="alm-stat-label">Top Elo</span></div>
                <div class="alm-stat"><span id="meta-avg" class="alm-stat-num">—</span><span class="alm-stat-label">Median Elo</span></div>
            </div>
        </header>

        <section class="alm-block">
            <div class="alm-ldr-record">
                <table class="alm-ladder">
                    <thead>
                        <tr>
                            <th>Rank</th>
                            <th>Player</th>
                            <th class="ctr">W</th>
                            <th class="ctr">L</th>
                            <th class="num">Elo</th>
                        </tr>
                    </thead>
                    <tbody id="ladder-table">
                        <tr><td colspan="5" style="padding:2.5rem;text-align:center;color:var(--ink-faint);">Loading rankings…</td></tr>
                    </tbody>
                </table>
            </div>
        </section>
      </div>
    </main>

    <div id="footer-placeholder"></div>

<script src="components.js?v=20260713m"></script>
<script>
    const SUPABASE_URL = 'https://ngnkbfazhdedaqvxcphw.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5nbmtiZmF6aGRlZGFxdnhjcGh3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MTE5NDksImV4cCI6MjA5MzI4Nzk0OX0.F_S6ORkFe-SuJPybs7FEFH94E6U2hZ5ern4vrg4kMOk';

    // Data now comes from Supabase `player_rankings`
    const PLAYER_TAGS = {
        'jonathan zhao': ['Website Feature Dev', 'Club Runner'],
        'damon yuan': ['Club Runner'],
        'fanda gong': ['Club Runner', 'Main Owner'],
        'oscar pan': ['Coach'],
        'mr siu': ['Teacher Supervisor']
    };

    function getPlayerTags(name) {
        return PLAYER_TAGS[(name || '').trim().toLowerCase()] || [];
    }

    function renderPlayerTags(name) {
        const tags = getPlayerTags(name);
        if (!tags.length) return '';
        return `<span class="alm-ldr-tags">${tags.map(t => `<span>${t}</span>`).join('')}</span>`;
    }

        async function getSupabaseClient() {
            if (window._supabaseClient) return window._supabaseClient;
            if (window.supabase) {
                window._supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                return window._supabaseClient;
            }
            if (document.readyState === 'loading') await new Promise(resolve => document.addEventListener('DOMContentLoaded', resolve));
            if (window.supabase && !window._supabaseClient) {
                window._supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            }
            if (window._supabaseClient) return window._supabaseClient;
            return null;
        }

        function normalizeKey(value) {
            return (value || '').toLowerCase().replace(/[^a-z0-9]+/g, '');
        }

        function sortPlayers(rows) {
            return rows.slice().sort((a, b) => {
                const eloDiff = (b.elo || 0) - (a.elo || 0);
                if (eloDiff !== 0) return eloDiff;
                const aOscar = normalizeKey(a.name) === 'oscarpan';
                const bOscar = normalizeKey(b.name) === 'oscarpan';
                if (aOscar !== bOscar) return aOscar ? -1 : 1;
                return (a.name || '').localeCompare(b.name || '');
            });
        }

        async function loadRankings() {
            const mainContent = document.getElementById('main-content');
            const pageFooter = document.getElementById('page-footer');
            const ladderTable = document.getElementById('ladder-table');

            if (ladderTable) {
                ladderTable.innerHTML = `<tr><td colspan="5" style="padding:2.5rem;text-align:center;color:var(--ink-faint);">Loading rankings…</td></tr>`;
            }

            try {
                const supabase = await getSupabaseClient();
                if (!supabase) throw new Error('Supabase client not available');
                const { data, error } = await supabase.from('player_rankings').select('name,elo,wins,losses').order('elo', { ascending: false });
                if (error) throw error;

                const players = sortPlayers((data || []).map(r => ({
                    name: r.name || 'Unknown',
                    elo: r.elo || 0,
                    wins: r.wins || 0,
                    losses: r.losses || 0
                })));

                // Masthead meta
                const playersEl = document.getElementById('meta-players');
                const topEl = document.getElementById('meta-top');
                const avgEl = document.getElementById('meta-avg');
                if (playersEl) playersEl.textContent = players.length || '—';
                if (topEl) topEl.textContent = players.length ? players[0].elo : '—';
                if (avgEl && players.length) {
                    const elos = players.map(p => p.elo).sort((a, b) => a - b);
                    const mid = Math.floor(elos.length / 2);
                    const median = elos.length % 2 ? elos[mid] : Math.round((elos[mid - 1] + elos[mid]) / 2);
                    avgEl.textContent = median;
                }

                if (!players.length) {
                    ladderTable.innerHTML = `<tr><td colspan="5" style="padding:2.5rem;text-align:center;color:var(--ink-faint);">No players ranked yet.</td></tr>`;
                    return;
                }

                ladderTable.innerHTML = players.map((p, i) => `
                <tr>
                    <td class="alm-ldr-rank">${String(i + 1).padStart(2, '0')}</td>
                    <td>
                        <a href="player-analysis.html?name=${encodeURIComponent(p.name)}" class="alm-ldr-name">${p.name}</a>${renderPlayerTags(p.name)}
                    </td>
                    <td class="ctr"><span class="alm-ldr-num alm-ldr-w">${p.wins}</span></td>
                    <td class="ctr"><span class="alm-ldr-num alm-ldr-l">${p.losses}</span></td>
                    <td class="alm-ldr-elo">${p.elo}</td>
                </tr>
            `).join('');
            } catch (err) {
                console.error("Data error:", err);
                if (ladderTable) {
                    ladderTable.innerHTML = `<tr><td colspan="5" style="padding:2.5rem;text-align:center;color:var(--oxblood);">Error loading data. Check your internet or Supabase configuration.</td></tr>`;
                }
            } finally {
                if (mainContent) mainContent.classList.remove('opacity-0');
                if (pageFooter) pageFooter.classList.remove('opacity-0');
            }
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', loadRankings);
        } else {
            loadRankings();
        }
</script>
</body>
</html>
