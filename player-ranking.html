            <button id="rankingNavToggle" type="button"
                class="sm:hidden inline-flex h-10 w-10 items-center justify-center rounded-xl border border-red-600 bg-red-700 text-white hover:bg-red-600 focus:outline-none focus:ring-2 focus:ring-red-400 transition-colors duration-200 overflow-hidden transform-gpu shrink-0"

                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                </svg>
                <svg id="close-icon" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 hidden transition-transform duration-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>

            <div id="rankingNavLinks" class="hidden w-full flex-col gap-1 mt-4 pt-4 border-t border-red-700/50 sm:flex sm:w-auto sm:flex-row sm:items-center sm:gap-2 sm:mt-0 sm:pt-0 sm:border-0 transition-all">
                <a href="player-ranking.html" class="block rounded-lg px-3 py-3 sm:py-2 bg-transparent hover:bg-white/10 transition-colors duration-200 overflow-hidden transform-gpu" style="backface-visibility: hidden; -webkit-transform: translateZ(0); transform: translateZ(0);">
                    <svg xmlns="http://www.w3.org/2000/svg" class="inline align-middle h-5 w-5 sm:h-4 sm:w-4 mr-3 sm:mr-2" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 3v18" /><path d="M17 3v18" /><path d="M7 7h10" /><path d="M7 11h10" /><path d="M7 15h10" /></svg>Rankings</a>
                <a href="player-matchup-ladder.html" class="block rounded-lg px-3 py-3 sm:py-2 bg-transparent hover:bg-white/10 transition-colors duration-200 overflow-hidden transform-gpu" style="backface-visibility: hidden; -webkit-transform: translateZ(0); transform: translateZ(0);">
                    <svg xmlns="http://www.w3.org/2000/svg" class="inline align-middle h-5 w-5 sm:h-4 sm:w-4 mr-3 sm:mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3M3 11h18M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>Matchups</a>
                <a href="club-analytics.html" class="block rounded-lg px-3 py-3 sm:py-2 bg-transparent hover:bg-white/10 transition-colors duration-200 overflow-hidden transform-gpu" style="backface-visibility: hidden; -webkit-transform: translateZ(0); transform: translateZ(0);">
                    <svg xmlns="http://www.w3.org/2000/svg" class="inline align-middle h-5 w-5 sm:h-4 sm:w-4 mr-3 sm:mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3v18h18M8 7v10M12 11v6M16 5v12" /></svg>Analytics</a>
                <a href="past-records.html" class="block rounded-lg px-3 py-3 sm:py-2 bg-transparent hover:bg-white/10 transition-colors duration-200 overflow-hidden transform-gpu" style="backface-visibility: hidden; -webkit-transform: translateZ(0); transform: translateZ(0);">
                    <svg xmlns="http://www.w3.org/2000/svg" class="inline align-middle h-5 w-5 sm:h-4 sm:w-4 mr-3 sm:mr-2" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="8" /><path d="M12 8v4" /><path d="M12 12l3 2" /></svg>Past Records</a>
                <a href="absence-report.html" class="block rounded-lg px-3 py-3 sm:py-2 bg-transparent hover:bg-white/10 transition-colors duration-200 overflow-hidden transform-gpu" style="backface-visibility: hidden; -webkit-transform: translateZ(0); transform: translateZ(0);">
                    <svg xmlns="http://www.w3.org/2000/svg" class="inline align-middle h-5 w-5 sm:h-4 sm:w-4 mr-3 sm:mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h8M8 11h8M8 15h5" /><rect x="4" y="3" width="16" height="18" rx="2" ry="2" /></svg>Absence</a>
                <a href="rules.html" class="block rounded-lg px-3 py-3 sm:py-2 bg-transparent hover:bg-white/10 transition-colors duration-200 overflow-hidden transform-gpu" style="backface-visibility: hidden; -webkit-transform: translateZ(0); transform: translateZ(0);">
                    <svg xmlns="http://www.w3.org/2000/svg" class="inline align-middle h-5 w-5 sm:h-4 sm:w-4 mr-3 sm:mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" /></svg>Rules</a>
                <a href="admin.html" class="block rounded-lg px-3 py-3 sm:py-2 bg-white/10 hover:bg-white/20 transition-colors duration-200 overflow-hidden transform-gpu" style="backface-visibility: hidden; -webkit-transform: translateZ(0); transform: translateZ(0);">
                    <svg xmlns="http://www.w3.org/2000/svg" class="inline align-middle h-4 w-4 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" /></svg>Admin Portal</a>
            </div>
        </nav>
    </header>

    <!-- CHANGE 2: Added id, flex-grow, and opacity-0 -->
    <main id="main-content" class="w-full flex-grow opacity-0 transition-opacity duration-500">
        <div class="max-w-4xl mx-auto p-6">
            <h1 class="text-3xl font-bold text-red-900 mb-6">Official Club Rankings</h1>

            <div class="bg-white rounded-2xl shadow-md overflow-x-auto">
                <table class="w-full min-w-max text-left">
                    <thead class="bg-slate-100 border-b">
                        <tr>
                            <th class="p-4 w-16">Rank</th>
                            <th class="p-4">Player Name</th>
                            <th class="p-4 text-center">Wins</th>
                            <th class="p-4 text-center">Losses</th>
                            <th class="p-4 text-right">Elo</th>
                        </tr>
                    </thead>
                    <tbody id="ladder-table">
                        <tr>
                            <td colspan="5" class="p-10 text-center text-slate-400">Fetching live rankings...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- CHANGE 3: Added id, mt-auto, and opacity-0 -->
    <footer id="page-footer" class="bg-slate-800 text-slate-400 mt-auto opacity-0 transition-opacity duration-500">
        <div class="max-w-6xl mx-auto flex items-center justify-between p-4 text-sm">
            <p>&copy; <span id="current-year">2024</span> NBHS Table Tennis Hub. All Rights Reserved.</p>
            <a href="#" class="hover:text-white transition-colors">Back to Top &uarr;</a>
        </div>
    </footer>

    <script>
        const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ_UHoHNgToKV4yCuB_M56029JuMrOYWN-VkyxDiWkwXHJI1hhRnon_GMnvgvmQeHmL4F0gxkVz7IMP/pub?gid=2082256240&single=true&output=csv";
        const PLAYER_TAGS = { 'jonathan zhao': ['Website Feature Dev', 'Club Runner'], 'damon yuan': ['Club Runner'], 'fanda gong': ['Club Runner', 'Main Owner'], 'mr siu': ['Teacher Supervisor'] };

        function getPlayerTags(name) { return PLAYER_TAGS[(name || '').trim().toLowerCase()] || []; }
        function renderPlayerTags(name) {
            return getPlayerTags(name).map(tag => `
                <span class="inline-flex items-center rounded-full bg-blue-50 px-2.5 py-0.5 text-[10px] font-bold uppercase tracking-wide text-blue-700">
                    ${tag}
                </span>
            `).join('');
        }

        async function loadRankings() {
            const mainContent = document.getElementById('main-content');
            const pageFooter = document.getElementById('page-footer');

            try {
                function parseCsv(text) {
                    const rows = []; let row = []; let field = ''; let inQuotes = false;
                    for (let i = 0; i < text.length; i++) { const char = text[i]; if (char === '"') { if (inQuotes && text[i + 1] === '"') { field += '"'; i++; } else { inQuotes = !inQuotes; } } else if (char === ',' && !inQuotes) { row.push(field); field = ''; } else if ((char === '\n' || char === '\r') && !inQuotes) { if (char === '\r' && text[i + 1] === '\n') i++; row.push(field); field = ''; rows.push(row); row = []; } else { field += char; } }
                    if (field !== '' || row.length > 0) { row.push(field); rows.push(row); } return rows;
                }

                const response = await fetch(SHEET_URL);
                const data = await response.text();
                const rows = parseCsv(data).filter(r => r.length > 0);
                const playerRows = rows.slice(1);

                const players = playerRows.map(cols => ({
                    name: cols[0]?.replace(/"/g, '').trim() || "Unknown",
                    elo: parseInt(cols[1]?.replace(/"/g, '').replace(/,/g, '').trim()) || 0,
                    wins: parseInt(cols[2]?.trim()) || 0,
                    losses: parseInt(cols[3]?.trim()) || 0
                }));

                players.sort((a, b) => b.elo - a.elo);

                const table = document.getElementById('ladder-table');
                table.innerHTML = players.map((p, i) => `
                    <tr class="border-b hover:bg-slate-50 transition-colors">
                        <td class="p-4 text-slate-400 font-bold">#${i + 1}</td>
                        <td class="p-4 font-semibold text-slate-800">
                            <div class="flex flex-wrap items-center gap-2">
                                <a href="player-analysis.html?name=${encodeURIComponent(p.name)}" class="text-red-600 hover:underline">${p.name}</a>
                                ${renderPlayerTags(p.name)}
                            </div>
                        </td>
                        <td class="p-4 text-center text-green-600 font-bold">${p.wins}</td>
                        <td class="p-4 text-center text-red-500 font-bold">${p.losses}</td>
                        <td class="p-4 text-right font-mono font-bold text-red-600">${p.elo}</td>
                    </tr>
                `).join('');

            } catch (err) {
                console.error("Fetch error:", err);
                document.getElementById('ladder-table').innerHTML = `<tr><td colspan="5" class="p-10 text-center text-red-500">Error loading data.</td></tr>`;
            } finally {
                // CHANGE 4: The trigger to reveal everything at once
                mainContent.classList.remove('opacity-0');
                pageFooter.classList.remove('opacity-0');
            }
        }

        loadRankings();

        // Standardized Navbar logic
        (function () {
            const t=document.getElementById("rankingNavToggle"),e=document.getElementById("rankingNavLinks"),n=document.getElementById("menu-icon"),o=document.getElementById("close-icon");
            if(t&&e)t.addEventListener("click",()=>{const s=e.classList.contains("hidden");s?(e.classList.remove("hidden"),e.classList.add("flex","animate-[fadeIn_0.2s_ease-in-out]"),n.classList.add("hidden"),o.classList.remove("hidden"),t.setAttribute("aria-expanded","true")):(e.classList.add("hidden"),e.classList.remove("flex","animate-[fadeIn_0.2s_ease-in-out]"),n.classList.remove("hidden"),o.classList.add("hidden"),t.setAttribute("aria-expanded","false"))})
        })();

        (function () {
            const yearEl = document.getElementById('current-year');
            if (yearEl) yearEl.textContent = new Date().getFullYear();
        })();
    </script>
</body>
</html>
