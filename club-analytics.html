    <link rel="icon" type="image/png" href="favicon.png">
</head>

<body class="bg-slate-50 text-slate-900 font-sans min-h-screen">

    <header class="bg-blue-800 text-white shadow-md">
        <nav class="max-w-4xl mx-auto flex items-center justify-between gap-4 px-4 py-4">
            <a href="index.html" class="text-xl font-bold">NBHS TT Hub</a>
            <button id="rankingNavToggle" type="button"
                class="sm:hidden inline-flex h-10 w-10 items-center justify-center rounded-xl border border-white/40 bg-white/10 text-white hover:bg-white/20"
                aria-label="Toggle navigation" aria-controls="rankingNavLinks" aria-expanded="false">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8h16M4 16h16" />
                </svg>
            </button>
            <div id="rankingNavLinks"
                class="hidden w-full flex-col gap-3 pt-4 sm:flex sm:w-auto sm:flex-row sm:items-center sm:pt-0">
                <a href="player-ranking.html" class="block hover:underline"><svg xmlns="http://www.w3.org/2000/svg"
                        class="inline align-middle h-4 w-4 mr-2" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M7 3v18" />
                        <path d="M17 3v18" />
                        <path d="M7 7h10" />
                        <path d="M7 11h10" />
                        <path d="M7 15h10" />
                    </svg>Rankings</a>
                <a href="player-matchup-ladder.html" class="block hover:underline"><svg
                        xmlns="http://www.w3.org/2000/svg" class="inline align-middle h-4 w-4 mr-2" fill="none"
                        viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M8 7V3m8 4V3M3 11h18M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                    </svg>Matchups</a>
                <a href="club-analytics.html" class="block font-bold border-b-2 border-white sm:border-none"><svg
                        xmlns="http://www.w3.org/2000/svg" class="inline align-middle h-4 w-4 mr-2" fill="none"
                        viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M3 3v18h18M8 7v10M12 11v6M16 5v12" />
                    </svg>Analytics</a>
                <a href="past-records.html" class="block hover:underline"><svg xmlns="http://www.w3.org/2000/svg"
                        class="inline align-middle h-4 w-4 mr-2" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <circle cx="12" cy="12" r="8" />
                        <path d="M12 8v4" />
                        <path d="M12 12l3 2" />
                    </svg>Past Records</a>
            </div>
        </nav>
    </header>

    <main class="max-w-4xl mx-auto p-6">
        <div class="flex flex-col gap-4 mb-6">
            <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
                <div>
                    <h1 class="text-3xl font-bold text-blue-900">Club Analytics</h1>
                    <p class="text-slate-600 mt-2">Live match and player analytics.
                        data.</p>
                </div>
                <span class="bg-blue-100 text-blue-800 text-xs font-bold px-3 py-1 rounded-full uppercase">Term 2</span>
            </div>

            <div id="analytics-summary" class="grid gap-4 lg:grid-cols-2"></div>

            <div id="analytics-highlights" class="grid gap-4 lg:grid-cols-2"></div>

            <div class="bg-white rounded-3xl border border-slate-200 shadow-sm p-6">
                <h2 class="text-xl font-bold text-slate-900 mb-4">Top 5 Most Active Players</h2>
                <ol id="active-player-list" class="list-decimal pl-5 space-y-3 text-slate-700"></ol>
            </div>
        </div>
    </main>

    <script>
        const STATS_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ_UHoHNgToKV4yCuB_M56029JuMrOYWN-VkyxDiWkwXHJI1hhRnon_GMnvgvmQeHmL4F0gxkVz7IMP/pub?output=csv&gid=2082256240";

        // Navbar toggle (shared)
        (function () {
            const rankingNavToggle = document.getElementById('rankingNavToggle');
            const rankingNavLinks = document.getElementById('rankingNavLinks');
            if (rankingNavToggle && rankingNavLinks) {
                rankingNavToggle.addEventListener('click', () => {
                    rankingNavLinks.classList.toggle('hidden');
                    const expanded = rankingNavLinks.classList.contains('hidden') ? 'false' : 'true';
                    rankingNavToggle.setAttribute('aria-expanded', expanded);
                });
            }
        })();
        const MATCHES_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ_UHoHNgToKV4yCuB_M56029JuMrOYWN-VkyxDiWkwXHJI1hhRnon_GMnvgvmQeHmL4F0gxkVz7IMP/pub?output=csv&gid=160991986";

        function parseCsv(text) {
            const rows = [];
            let row = [];
            let field = '';
            let inQuotes = false;

            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                if (char === '"') {
                    if (inQuotes && text[i + 1] === '"') {
                        field += '"';
                        i++;
                    } else {
                        inQuotes = !inQuotes;
                    }
                } else if (char === ',' && !inQuotes) {
                    row.push(field);
                    field = '';
                } else if ((char === '\n' || char === '\r') && !inQuotes) {
                    if (char === '\r' && text[i + 1] === '\n') i++;
                    row.push(field);
                    field = '';
                    rows.push(row);
                    row = [];
                } else {
                    field += char;
                }
            }

            if (field !== '' || row.length > 0) {
                row.push(field);
                rows.push(row);
            }

            return rows;
        }

        function clean(value) {
            return (value || '').toString().replace(/"/g, '').trim();
        }

        function parseNumber(value) {
            return parseInt((value || '').toString().replace(/,/g, '').trim(), 10) || 0;
        }

        function parseScoreDiff(score) {
            const match = (score || '').toString().replace(/\u2011/g, '-').match(/(\d+)\D+(\d+)/);
            if (!match) return null;
            return Math.abs(parseInt(match[1], 10) - parseInt(match[2], 10));
        }

        function formatMatch(match) {
            return `${match.winner} beat ${match.loser} ${match.score} (${match.diff} pt${match.diff === 1 ? '' : 's'})`;
        }

        function addCard(container, title, value, detail) {
            const card = document.createElement('div');
            card.className = 'bg-white rounded-3xl border border-slate-200 shadow-sm p-6';
            card.innerHTML = `
                <p class="text-sm uppercase tracking-[0.22em] text-slate-500 font-semibold">${title}</p>
                <p class="text-3xl font-bold text-slate-900 mt-4">${value}</p>
                <p class="mt-3 text-slate-600 text-sm">${detail}</p>
            `;
            container.appendChild(card);
        }

        async function loadAnalytics() {
            const summary = document.getElementById('analytics-summary');
            const highlights = document.getElementById('analytics-highlights');
            const activeList = document.getElementById('active-player-list');

            summary.innerHTML = '<div class="col-span-full rounded-3xl border border-slate-200 bg-white p-6 text-slate-500">Loading master analytics...</div>';

            try {
                const [statsResp, matchesResp] = await Promise.all([fetch(STATS_URL), fetch(MATCHES_URL)]);
                if (!statsResp.ok || !matchesResp.ok) throw new Error('Unable to fetch data.');

                const statsText = await statsResp.text();
                const matchesText = await matchesResp.text();

                // 1. Get current player ratings for reference
                const statsRows = parseCsv(statsText).filter(row => row.length > 0);
                const players = statsRows.slice(1).map(cols => ({
                    name: clean(cols[0]),
                    elo: parseNumber(cols[1])
                })).filter(p => p.name);

                const eloMap = players.reduce((acc, player) => {
                    acc[player.name] = player.elo;
                    return acc;
                }, {});

                // 2. Parse matches from Elo_History
                // Filter: Row must have at least 11 columns and a winner name
                const matchRows = parseCsv(matchesText).filter(row => row.length >= 11 && row[2]);

                const matches = matchRows.slice(1).map(cols => {
                    const player1 = clean(cols[0]);
                    const player2 = clean(cols[1]);
                    const winner = clean(cols[2]);
                    const score = clean(cols[3]);

                    // Logic to find elo at the TIME of match (optional) 
                    // or just use current elo Map
                    const loser = winner.toLowerCase() === player1.toLowerCase() ? player2 : player1;

                    // For Upset logic: Column J (9) and K (10) contain the new Elos
                    // We'll use those to see who beat a higher-rated player
                    const p1Elo = parseNumber(cols[9]);
                    const p2Elo = parseNumber(cols[10]);

                    return {
                        winner, loser, score,
                        winnerElo: winner.toLowerCase() === player1.toLowerCase() ? p1Elo : p2Elo,
                        loserElo: winner.toLowerCase() === player1.toLowerCase() ? p2Elo : p1Elo,
                        scoreDiff: parseScoreDiff(score) || 0
                    };
                });

                const totalMatches = matches.length;
                const counts = {};
                const winCounts = {};

                matches.forEach(m => {
                    counts[m.winner] = (counts[m.winner] || 0) + 1;
                    counts[m.loser] = (counts[m.loser] || 0) + 1;
                    winCounts[m.winner] = (winCounts[m.winner] || 0) + 1;
                });

                const activePlayers = Object.entries(counts)
                    .map(([name, count]) => ({ name, count }))
                    .sort((a, b) => b.count - a.count);

                const biggestUpset = matches
                    .filter(m => m.loserElo > m.winnerElo) // Winner had lower Elo BEFORE the change
                    .sort((a, b) => (b.loserElo - b.winnerElo) - (a.loserElo - a.winnerElo))[0];

                summary.innerHTML = '';
                addCard(summary, 'Total Match Records', totalMatches, 'Every match archived in history.');
                addCard(summary, 'Highest Elo', players.length ? Math.max(...players.map(p => p.elo)) : 'N/A', 'Top rating in the current rankings.');

                const topWinner = Object.entries(winCounts).sort((a, b) => b[1] - a[1])[0];
                addCard(summary, 'Club Leader', topWinner ? `${topWinner[0]} (${topWinner[1]} wins)` : 'N/A', 'Player with the most total wins recorded.');

                const topActive = activePlayers[0];
                addCard(summary, 'Most Dedicated', topActive ? `${topActive.name} (${topActive.count})` : 'N/A', 'Most matches played (Win or Loss).');

                highlights.innerHTML = '';
                if (biggestUpset) {
                    const margin = Math.abs(biggestUpset.loserElo - biggestUpset.winnerElo);
                    addCard(highlights, 'Biggest Upset', `${biggestUpset.winner} vs ${biggestUpset.loser}`, `Overcame a ${margin} Elo point gap!`);
                }

                activeList.innerHTML = activePlayers.slice(0, 5).map(p => `
            <li class="text-slate-700 font-medium">
                ${p.name} — <span class="text-blue-600 font-bold">${p.count}</span> matches
            </li>
        `).join('');

            } catch (error) {
                console.error('Analytics error:', error);
                summary.innerHTML = '<div class="col-span-full p-6 text-red-500">Sync Error: Verify the History GID is correct.</div>';
            }
        }
        loadAnalytics();
    </script>
</body>

</html>
