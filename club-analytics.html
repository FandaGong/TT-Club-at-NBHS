<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Club Analytics - NBHS Table Tennis</title>
    <script src="tailwind-theme.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="animations.css">
    <link rel="icon" type="image/png" href="favicon.png">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<!-- CHANGE 1: Turn the body into a flex column for the sticky footer -->

<body class="site-surface text-slate-900 font-sans min-h-screen flex flex-col">

    <div id="header-placeholder"></div>

    <main id="main-content" class="site-shell max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-6 flex-grow w-full transition-opacity duration-300">
        <div class="flex flex-col gap-4 mb-6">
            <div class="page-hero flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between p-6 sm:p-8 text-left">
                <div class="max-w-2xl">
                    <h1 class="page-hero-title text-3xl font-bold mt-3">Club Analytics</h1>
                    <p class="page-hero-copy mt-2">Live match and player analytics.</p>
                </div>
                <span class="stat-chip self-start sm:self-center text-xs font-bold px-3 py-1 uppercase">Term 2</span>
            </div>

            <div id="analytics-summary" class="grid gap-4 lg:grid-cols-2"></div>
            <div id="analytics-highlights" class="grid gap-4 lg:grid-cols-2"></div>

            <div class="section-card p-6">
                <h2 class="section-heading mb-4">Top 5 Most Active Players</h2>
                <ol id="active-player-list" class="list-decimal pl-5 space-y-3 text-slate-700"></ol>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="components.js"></script>
    <script>
        // Use Supabase `player_rankings` and `match_history` tables
        async function getSupabaseClient() {
            if (window._supabaseClient) return window._supabaseClient;
            if (window.supabase) {
                window._supabaseClient = window.supabase.createClient('https://ngnkbfazhdedaqvxcphw.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5nbmtiZmF6aGRlZGFxdnhjcGh3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MTE5NDksImV4cCI6MjA5MzI4Nzk0OX0.F_S6ORkFe-SuJPybs7FEFH94E6U2hZ5ern4vrg4kMOk');
                return window._supabaseClient;
            }
            if (document.readyState === 'loading') await new Promise(resolve => document.addEventListener('DOMContentLoaded', resolve));
            return window._supabaseClient;
        }

        // ... (parseCsv, clean, parseNumber, parseScoreDiff, formatMatch, addCard functions are unchanged)
        function parseCsv(text) {
            const rows = []; let row = []; let field = ''; let inQuotes = false;
            for (let i = 0; i < text.length; i++) { const char = text[i]; if (char === '"') { if (inQuotes && text[i + 1] === '"') { field += '"'; i++; } else { inQuotes = !inQuotes; } } else if (char === ',' && !inQuotes) { row.push(field); field = ''; } else if ((char === '\n' || char === '\r') && !inQuotes) { if (char === '\r' && text[i + 1] === '\n') i++; row.push(field); field = ''; rows.push(row); row = []; } else { field += char; } }
            if (field !== '' || row.length > 0) { row.push(field); rows.push(row); } return rows;
        }
        function clean(value) { return (value || '').toString().replace(/"/g, '').trim(); }
        function parseNumber(value) { return parseInt((value || '').toString().replace(/,/g, '').trim(), 10) || 0; }
        function parseScoreDiff(score) { const match = (score || '').toString().replace(/\u2011/g, '-').match(/(\d+)\D+(\d+)/); if (!match) return null; return Math.abs(parseInt(match[1], 10) - parseInt(match[2], 10)); }
        function formatMatch(match) { return `${match.winner} beat ${match.loser} ${match.score} (${match.diff} pt${match.diff === 1 ? '' : 's'})`; }
        function addCard(container, title, value, detail) { const card = document.createElement('div'); card.className = 'section-card p-6 h-full'; card.innerHTML = `<p class="text-sm uppercase tracking-[0.22em] text-slate-500 font-semibold">${title}</p><p class="text-3xl font-bold text-slate-900 mt-4">${value}</p><p class="mt-3 text-slate-600 text-sm">${detail}</p>`; container.appendChild(card); }
        function normalizeKey(value) { return (value || '').toString().toLowerCase().replace(/[^a-z0-9]+/g, ''); }
        function getUpset(match) {
            const p1Name = match.player_1 || '';
            const p2Name = match.player_2 || '';
            const winner = match.winner || '';
            const p1Old = (match.p1_new_elo || 0) - (match.p1_elo_change || 0);
            const p2Old = (match.p2_new_elo || 0) - (match.p2_elo_change || 0);
            const p1Won = normalizeKey(winner) === normalizeKey(p1Name);
            const p2Won = normalizeKey(winner) === normalizeKey(p2Name);
            const winnerOld = p1Won ? p1Old : p2Won ? p2Old : 0;
            const loserOld = p1Won ? p2Old : p2Won ? p1Old : 0;
            const loser = p1Won ? p2Name : p2Won ? p1Name : '';
            const margin = Math.max(0, loserOld - winnerOld);
            return { ...match, loser, margin };
        }

        async function loadAnalytics() {
            const summary = document.getElementById('analytics-summary');
            const highlights = document.getElementById('analytics-highlights');
            const activeList = document.getElementById('active-player-list');
            const mainContent = document.getElementById('main-content');
            const pageFooter = document.getElementById('page-footer');

            summary.innerHTML = '<div class="section-card col-span-full p-6 text-slate-500">Loading master analytics...</div>';

            try {
                const supabase = await getSupabaseClient();
                if (!supabase) throw new Error('Supabase client not available');

                const [{ data: players }] = [await supabase.from('player_rankings').select('name,elo')];
                const { data: matches } = await supabase.from('match_history').select('*');

                const totalMatches = (matches || []).length;
                const counts = {}, winCounts = {};
                (matches || []).forEach(m => {
                    const winner = m.winner || '';
                    const loser = (winner === m.player_1 ? m.player_2 : m.player_1) || '';
                    if (winner) counts[winner] = (counts[winner] || 0) + 1;
                    if (loser) counts[loser] = (counts[loser] || 0) + 1;
                    if (winner) winCounts[winner] = (winCounts[winner] || 0) + 1;
                });

                const activePlayers = Object.entries(counts).map(([name, count]) => ({ name, count })).sort((a, b) => b.count - a.count);
                const biggestUpset = (matches || [])
                    .map(getUpset)
                    .filter(upset => upset.margin > 0)
                    .sort((a, b) => b.margin - a.margin)[0];
                const topWinner = Object.entries(winCounts).sort((a, b) => b[1] - a[1])[0];
                const topActive = activePlayers[0];

                summary.innerHTML = '';
                addCard(summary, 'Total Match Records', totalMatches, 'Every match archived in history.');
                addCard(summary, 'Highest Elo', players && players.length ? Math.max(...players.map(p => p.elo || 0)) : 'N/A', 'Top rating in the current rankings.');
                addCard(summary, 'Club Leader', topWinner ? `${topWinner[0]} (${topWinner[1]} wins)` : 'N/A', 'Player with the most total wins recorded.');
                addCard(summary, 'Most Dedicated', topActive ? `${topActive.name} (${topActive.count})` : 'N/A', 'Most matches played (Win or Loss).');

                highlights.innerHTML = '';
                if (biggestUpset) {
                    addCard(highlights, 'Biggest Upset', `${biggestUpset.winner} vs ${biggestUpset.loser}`, `Overcame a ${biggestUpset.margin} Elo point gap!`);
                }
                activeList.innerHTML = activePlayers.slice(0, 5).map(p => `<li class="text-slate-700 font-medium">${p.name} — <span class="text-red-600 font-bold">${p.count}</span> matches</li>`).join('');

            } catch (error) {
                console.error('Analytics error:', error);
                summary.innerHTML = '<div class="section-card col-span-full p-6 text-red-500">Sync Error: Verify the Supabase project configuration.</div>';
            } finally {
                // CHANGE 4: This will run after the data loads (or fails), fading in the content.
                mainContent.classList.remove('opacity-0');
                pageFooter.classList.remove('opacity-0');
            }
        }

        // Navbar toggle (shared) - This function can be the same on all pages
        (function () {
            const rankingNavToggle = document.getElementById('rankingNavToggle');
            const rankingNavLinks = document.getElementById('rankingNavLinks');
            const menuIcon = document.getElementById('menu-icon');
            const closeIcon = document.getElementById('close-icon');
            if (rankingNavToggle && rankingNavLinks) {
                rankingNavToggle.addEventListener('click', () => {
                    const isHidden = rankingNavLinks.classList.contains('hidden');
                    if (isHidden) {
                        rankingNavLinks.classList.remove('hidden'); rankingNavLinks.classList.add('flex', 'animate-[fadeIn_0.2s_ease-in-out]'); menuIcon.classList.add('hidden'); closeIcon.classList.remove('hidden'); rankingNavToggle.setAttribute('aria-expanded', 'true');
                    } else {
                        rankingNavLinks.classList.add('hidden'); rankingNavLinks.classList.remove('flex', 'animate-[fadeIn_0.2s_ease-in-out]'); menuIcon.classList.remove('hidden'); closeIcon.classList.add('hidden'); rankingNavToggle.setAttribute('aria-expanded', 'false');
                    }
                });
            }
        })();

        // Update footer year (shared)
        (function () {
            const yearEl = document.getElementById('current-year');
            if (yearEl) {
                yearEl.textContent = new Date().getFullYear();
            }
        })();

        // Run the analytics loader
        loadAnalytics();
    </script>

<script>
(function() {
    if (window.__nbhsNavLoginTextInit__) return;
    window.__nbhsNavLoginTextInit__ = true;

    const defaultLabel = 'Login';
    const profileLabel = 'Profile';
    const adminLabel = 'Admin Portal';
    const adminAllowlist = ['nbhsttclub@gmail.com'];
    const supabaseUrl = 'https://ngnkbfazhdedaqvxcphw.supabase.co';
    const supabaseAnonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5nbmtiZmF6aGRlZGFxdnhjcGh3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MTE5NDksImV4cCI6MjA5MzI4Nzk0OX0.F_S6ORkFe-SuJPybs7FEFH94E6U2hZ5ern4vrg4kMOk';

    const loginLink = document.getElementById('navLoginLink');
    if (!loginLink) return;
    let loginText = document.getElementById('navLoginLinkText');
    if (!loginText) {
        loginText = document.createElement('span');
        loginText.id = 'navLoginLinkText';
        loginText.style.opacity = '0';
        loginText.textContent = '';
        loginLink.appendChild(loginText);
    }

    function setLabel(label) {
        loginText.textContent = label;
        loginText.style.opacity = '1';
    }

    function updateLabel(session) {
        const email = session?.user?.email?.toLowerCase();
        if (!email) {
            setLabel(defaultLabel);
            return;
        }
        setLabel(adminAllowlist.includes(email) ? adminLabel : profileLabel);
    }

    function initializeSupabase() {
        if (!window.supabase) {
            const script = document.createElement('script');
            script.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2';
            script.onload = initializeSupabase;
            document.head.appendChild(script);
            return;
        }

        const client = window.supabase.createClient(supabaseUrl, supabaseAnonKey);
        client.auth.getSession().then(({ data }) => updateLabel(data?.session)).catch(() => setLabel(defaultLabel));
        client.auth.onAuthStateChange((_event, session) => updateLabel(session));
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initializeSupabase);
    } else {
        initializeSupabase();
    }
})();
</script>

</body>

</html>
