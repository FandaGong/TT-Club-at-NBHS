<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Club Analytics - NBHS Table Tennis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/png" href="favicon.png">
</head>
<body class="bg-slate-50 text-slate-900 font-sans min-h-screen">

    <header class="bg-blue-800 text-white p-4 shadow-md">
        <nav class="max-w-4xl mx-auto flex flex-wrap gap-6">
            <a href="index.html" class="hover:underline">Home</a>
            <a href="player-ranking.html" class="hover:underline">Rankings</a>
            <a href="player-matchup-ladder.html" class="hover:underline">Matchups</a>
            <a href="club-analytics.html" class="font-bold border-b-2 border-white">Analytics</a>
            <a href="past-records.html" class="hover:underline">Past Records</a>
        </nav>
    </header>

    <main class="max-w-4xl mx-auto p-6">
        <div class="flex flex-col gap-4 mb-6">
            <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
                <div>
                    <h1 class="text-3xl font-bold text-blue-900">Club Analytics</h1>
                    <p class="text-slate-600 mt-2">Live match and player analytics based on your published Google Sheets data.</p>
                </div>
                <span class="bg-blue-100 text-blue-800 text-xs font-bold px-3 py-1 rounded-full uppercase">Term 2</span>
            </div>

            <div id="analytics-summary" class="grid gap-4 lg:grid-cols-2"></div>

            <div id="analytics-highlights" class="grid gap-4 lg:grid-cols-2"></div>

            <div class="bg-white rounded-3xl border border-slate-200 shadow-sm p-6">
                <h2 class="text-xl font-bold text-slate-900 mb-4">Top 5 Most Active Players</h2>
                <ol id="active-player-list" class="list-decimal pl-5 space-y-3 text-slate-700"></ol>
            </div>
        </div>
    </main>

    <script>
        const STATS_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ_UHoHNgToKV4yCuB_M56029JuMrOYWN-VkyxDiWkwXHJI1hhRnon_GMnvgvmQeHmL4F0gxkVz7IMP/pub?output=csv&gid=2082256240";
        const MATCHES_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ_UHoHNgToKV4yCuB_M56029JuMrOYWN-VkyxDiWkwXHJI1hhRnon_GMnvgvmQeHmL4F0gxkVz7IMP/pub?output=csv&gid=859312421";

        function parseCsv(text) {
            const rows = [];
            let row = [];
            let field = '';
            let inQuotes = false;

            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                if (char === '"') {
                    if (inQuotes && text[i + 1] === '"') {
                        field += '"';
                        i++;
                    } else {
                        inQuotes = !inQuotes;
                    }
                } else if (char === ',' && !inQuotes) {
                    row.push(field);
                    field = '';
                } else if ((char === '\n' || char === '\r') && !inQuotes) {
                    if (char === '\r' && text[i + 1] === '\n') i++;
                    row.push(field);
                    field = '';
                    rows.push(row);
                    row = [];
                } else {
                    field += char;
                }
            }

            if (field !== '' || row.length > 0) {
                row.push(field);
                rows.push(row);
            }

            return rows;
        }

        function clean(value) {
            return (value || '').toString().replace(/"/g, '').trim();
        }

        function parseNumber(value) {
            return parseInt((value || '').toString().replace(/,/g, '').trim(), 10) || 0;
        }

        function parseScoreDiff(score) {
            const match = (score || '').toString().replace(/\u2011/g, '-').match(/(\d+)\D+(\d+)/);
            if (!match) return null;
            return Math.abs(parseInt(match[1], 10) - parseInt(match[2], 10));
        }

        function formatMatch(match) {
            return `${match.winner} beat ${match.loser} ${match.score} (${match.diff} pt${match.diff === 1 ? '' : 's'})`;
        }

        function addCard(container, title, value, detail) {
            const card = document.createElement('div');
            card.className = 'bg-white rounded-3xl border border-slate-200 shadow-sm p-6';
            card.innerHTML = `
                <p class="text-sm uppercase tracking-[0.22em] text-slate-500 font-semibold">${title}</p>
                <p class="text-3xl font-bold text-slate-900 mt-4">${value}</p>
                <p class="mt-3 text-slate-600 text-sm">${detail}</p>
            `;
            container.appendChild(card);
        }

        async function loadAnalytics() {
            const summary = document.getElementById('analytics-summary');
            const highlights = document.getElementById('analytics-highlights');
            const activeList = document.getElementById('active-player-list');

            summary.innerHTML = '<div class="col-span-full rounded-3xl border border-slate-200 bg-white p-6 text-slate-500">Loading club analytics...</div>';
            highlights.innerHTML = '';
            activeList.innerHTML = '';

            try {
                const [statsResp, matchesResp] = await Promise.all([fetch(STATS_URL), fetch(MATCHES_URL)]);
                if (!statsResp.ok || !matchesResp.ok) throw new Error('Unable to fetch spreadsheet data.');

                const statsText = await statsResp.text();
                const matchesText = await matchesResp.text();

                const statsRows = parseCsv(statsText).filter(row => row.length > 0);
                const players = statsRows.slice(1).map(cols => ({
                    name: clean(cols[0]),
                    elo: parseNumber(cols[1])
                })).filter(p => p.name);

                const eloMap = players.reduce((acc, player) => {
                    acc[player.name] = player.elo;
                    return acc;
                }, {});

                const matchRows = parseCsv(matchesText).filter(row => row.length > 0).slice(1);
                const matches = matchRows.map(cols => {
                    const player1 = clean(cols[0]);
                    const player2 = clean(cols[1]);
                    const winner = clean(cols[2]);
                    const score = clean(cols[3]);
                    const division = clean(cols[4]);
                    const table = clean(cols[5]);
                    const half = clean(cols[6]);
                    const player1Elo = eloMap[player1] || 0;
                    const player2Elo = eloMap[player2] || 0;
                    const loser = winner.toLowerCase() === player1.toLowerCase() ? player2 : player1;
                    const winnerElo = eloMap[winner] || 0;
                    const loserElo = winner.toLowerCase() === player1.toLowerCase() ? player2Elo : player1Elo;
                    const diff = parseScoreDiff(score);

                    return {
                        player1,
                        player2,
                        winner,
                        loser,
                        score,
                        division,
                        table,
                        half,
                        player1Elo,
                        player2Elo,
                        winnerElo,
                        loserElo,
                        eloDiff: Math.abs(player1Elo - player2Elo),
                        upsetMargin: loserElo - winnerElo,
                        scoreDiff: diff === null ? 0 : diff
                    };
                }).filter(m => m.player1 && m.player2 && m.winner);

                const totalMatches = matches.length;
                const counts = {};
                const winCounts = {};
                matches.forEach(match => {
                    counts[match.player1] = (counts[match.player1] || 0) + 1;
                    counts[match.player2] = (counts[match.player2] || 0) + 1;
                    winCounts[match.winner] = (winCounts[match.winner] || 0) + 1;
                });

                const activePlayers = Object.entries(counts)
                    .map(([name, count]) => ({ name, count }))
                    .sort((a, b) => b.count - a.count || a.name.localeCompare(b.name));

                const mostActive = activePlayers[0] || { name: 'N/A', count: 0 };
                const mostWinsEntry = Object.entries(winCounts)
                    .map(([name, count]) => ({ name, count }))
                    .sort((a, b) => b.count - a.count || a.name.localeCompare(b.name))[0] || { name: 'N/A', count: 0 };
                const highestElo = players.length ? Math.max(...players.map(player => player.elo)) : 0;

                const biggestUpset = matches
                    .filter(match => match.upsetMargin > 0)
                    .sort((a, b) => b.upsetMargin - a.upsetMargin)[0];
                const biggestGap = matches
                    .slice()
                    .sort((a, b) => b.eloDiff - a.eloDiff)[0];
                
                summary.innerHTML = '';
                addCard(summary, 'Total Matches Played', totalMatches, 'Count of row entries in the Matches sheet.');
                addCard(summary, 'Highest Elo Recorded', highestElo || 'N/A', 'Top Elo value found in the current roster sheet.');
                addCard(summary, 'Most Wins', `${mostWinsEntry.name} (${mostWinsEntry.count})`, 'Player with the highest count of match wins.');
                addCard(summary, 'Most Active Player', `${mostActive.name} (${mostActive.count})`, 'Most appearances across all match rows.');

                highlights.innerHTML = '';
                if (biggestUpset) {
                    addCard(highlights, 'Biggest Upset', `${biggestUpset.winner} over ${biggestUpset.loser}`, `Won by ${biggestUpset.upsetMargin} Elo points with score ${biggestUpset.score}.`);
                } else {
                    addCard(highlights, 'Biggest Upset', 'None found', 'No match was won by the lower-rated player.');
                }

                if (biggestGap) {
                    const favorite = biggestGap.winnerElo >= biggestGap.loserElo ? biggestGap.winner : biggestGap.loser;
                    addCard(highlights, 'Largest Elo Gap', `${favorite} vs ${biggestGap.loser}`, `Gap of ${biggestGap.eloDiff} Elo points in Division ${biggestGap.division}.`);
                }

                activeList.innerHTML = activePlayers.slice(0, 5).map((player, index) => `
                    <li class="text-slate-700">
                        <span class="font-semibold">${player.name}</span> — ${player.count} match${player.count === 1 ? '' : 'es'}
                    </li>
                `).join('');
            } catch (error) {
                console.error('Analytics load error:', error);
                summary.innerHTML = '<div class="col-span-full rounded-3xl border border-slate-200 bg-white p-6 text-red-500">Unable to load analytics. Check the spreadsheet link or internet connection.</div>';
                highlights.innerHTML = '';
                activeList.innerHTML = '';
            }
        }

        loadAnalytics();
    </script>
</body>
</html>
