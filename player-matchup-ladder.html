<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matchup Ladder - NBHS Table Tennis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/png" href="favicon.png">
</head>

<body class="bg-slate-50 text-slate-900 font-sans min-h-screen">

    <header class="bg-blue-800 text-white shadow-md">
        <nav class="max-w-4xl mx-auto flex items-center justify-between gap-4 px-4 py-4">
            <a href="index.html" class="text-xl font-bold">NBHS TT Hub</a>
            <button id="rankingNavToggle" type="button"
                class="sm:hidden inline-flex h-10 w-10 items-center justify-center rounded-xl border border-white/20 bg-blue-900/20 text-white hover:bg-blue-900/40"
                aria-label="Toggle navigation" aria-controls="rankingNavLinks" aria-expanded="false">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8h16M4 16h16" />
                </svg>
            </button>
            <div id="rankingNavLinks"
                class="hidden w-full flex-col gap-3 pt-4 sm:flex sm:w-auto sm:flex-row sm:items-center sm:pt-0">
                <a href="player-ranking.html" class="block hover:underline"><svg xmlns="http://www.w3.org/2000/svg"
                        class="inline align-middle h-4 w-4 mr-2" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M7 3v18" />
                        <path d="M17 3v18" />
                        <path d="M7 7h10" />
                        <path d="M7 11h10" />
                        <path d="M7 15h10" />
                    </svg>Rankings</a>
                <a href="player-matchup-ladder.html" class="block font-bold border-b-2 border-white sm:border-none"><svg
                        xmlns="http://www.w3.org/2000/svg" class="inline align-middle h-4 w-4 mr-2" fill="none"
                        viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M8 7V3m8 4V3M3 11h18M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                    </svg>Matchups</a>
                <a href="club-analytics.html" class="block hover:underline"><svg xmlns="http://www.w3.org/2000/svg"
                        class="inline align-middle h-4 w-4 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M3 3v18h18M8 7v10M12 11v6M16 5v12" />
                    </svg>Analytics</a>
                <a href="past-records.html" class="block hover:underline"><svg xmlns="http://www.w3.org/2000/svg"
                        class="inline align-middle h-4 w-4 mr-2" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <circle cx="12" cy="12" r="8" />
                        <path d="M12 8v4" />
                        <path d="M12 12l3 2" />
                    </svg>Past Records</a>
            </div>
        </nav>
    </header>

<main class="max-w-4xl mx-auto p-6">
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-3xl font-bold text-blue-900">Weekly Matchups</h1>
        
        <span class="bg-white text-blue-800 text-xs font-bold px-3 py-1 rounded-lg border border-slate-200 uppercase shadow-sm">
            Term 2 - Week 4
        </span>
    </div>

        <div class="flex flex-col gap-4 mb-6">
            <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-3">
                <div>
                    <p class="text-sm uppercase tracking-[0.18em] text-slate-500 font-bold">View half</p>
                    <div class="inline-flex rounded-xl bg-white border border-slate-200 p-1 mt-2" role="group">
                        <button id="half2Btn" type="button"
                            class="px-4 py-2 rounded-lg text-sm font-semibold transition-colors">Half 2</button>
                        <button id="half1Btn" type="button"
                            class="px-4 py-2 rounded-lg text-sm font-semibold transition-colors">Half 1</button>
                    </div>
                </div>
                <div class="rounded-xl bg-white border border-slate-200 p-4 text-sm text-slate-600 shadow-sm">
                    <p class="font-semibold text-slate-800">Table assignments</p>
                    <p class="mt-1">Div 1 → Table 1 · Div 2 → Tables 2 &amp; 3 · Div 3 → Table 4</p>
                </div>
            </div>

            <div id="matchup-summary" class="rounded-2xl bg-white p-5 border border-slate-200 shadow-sm text-slate-700">
            </div>
        </div>

        <div id="matchup-container" class="grid gap-4 md:grid-cols-2"></div>
    </main>

    <script>
        const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ_UHoHNgToKV4yCuB_M56029JuMrOYWN-VkyxDiWkwXHJI1hhRnon_GMnvgvmQeHmL4F0gxkVz7IMP/pub?gid=2082256240&single=true&output=csv";

        function parseCsvRows(text) {
            const rows = [];
            let row = [];
            let field = '';
            let inQuotes = false;

            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                if (char === '"') {
                    if (inQuotes && text[i + 1] === '"') {
                        field += '"';
                        i++;
                    } else {
                        inQuotes = !inQuotes;
                    }
                } else if (char === ',' && !inQuotes) {
                    row.push(field);
                    field = '';
                } else if ((char === '\n' || char === '\r') && !inQuotes) {
                    if (char === '\r' && text[i + 1] === '\n') i++;
                    row.push(field);
                    field = '';
                    rows.push(row);
                    row = [];
                } else {
                    field += char;
                }
            }

            if (field !== '' || row.length > 0) {
                row.push(field);
                rows.push(row);
            }

            return rows;
        }

        function normalizePlayer(row) {
            const name = row[0] ? row[0].replace(/"/g, '').trim() : '';
            const eloText = row[1] ? row[1].replace(/"/g, '').replace(/,/g, '').trim() : '0';
            return {
                name,
                elo: parseInt(eloText, 10) || 0
            };
        }

        function buildHalfData(players) {
            return {
                title: 'Half 2 — Better Half',
                subtitle: 'Top 16 players in descending Elo order.',
                divisions: [
                    {
                        name: 'Division 1',
                        tableLabel: 'Table 1',
                        description: '4 players compete on Table 1.',
                        players: players.slice(0, 4)
                    },
                    {
                        name: 'Division 2',
                        tableLabel: 'Tables 2 & 3',
                        description: '8 players on Tables 2 & 3.',
                        players: players.slice(4, 12)
                    },
                    {
                        name: 'Division 3',
                        tableLabel: 'Table 4',
                        description: '4 players compete on Table 4.',
                        players: players.slice(12, 16)
                    }
                ]
            };
        }

        function buildPlayerList(players) {
            return players.map(player => `
                <li class="py-1 text-sm text-slate-700">
                    <span class="font-semibold">${player.name}</span>
                    <span class="text-slate-400">(${player.elo})</span>
                </li>
            `).join('');
        }

        function renderHalfData(halfKey, half) {
            const container = document.getElementById('matchup-container');
            const summary = document.getElementById('matchup-summary');

            container.innerHTML = half.divisions.map(division => {
                if (division.name === 'Division 2') {
                    const firstGroup = division.players.slice(0, 4);
                    const secondGroup = division.players.slice(4);
                    return [
                        {
                            divisionName: division.name,
                            tableLabel: 'Table 2',
                            description: division.description,
                            players: firstGroup
                        },
                        {
                            divisionName: division.name,
                            tableLabel: 'Table 3',
                            description: division.description,
                            players: secondGroup
                        }
                    ].map(card => `
                        <div class="bg-white p-5 rounded-3xl border border-slate-200 shadow-sm">
                            <div class="flex items-start justify-between gap-4 mb-4">
                                <div class="min-w-0">
                                    <p class="text-xs uppercase tracking-[0.2em] text-slate-500 font-semibold whitespace-nowrap">${card.divisionName}</p>
                                    <h2 class="text-xl font-bold text-slate-900 mt-2 whitespace-nowrap">${card.tableLabel}</h2>
                                </div>
                                <span class="inline-flex items-center rounded-full bg-blue-50 px-3 py-1 text-xs font-semibold text-blue-700">${card.description}</span>
                            </div>
                            <ul class="space-y-2">
                                ${buildPlayerList(card.players)}
                            </ul>
                        </div>
                    `).join('');
                }

                return `
                    <div class="bg-white p-5 rounded-3xl border border-slate-200 shadow-sm">
                        <div class="flex items-start justify-between gap-4 mb-4">
                            <div class="min-w-0">
                                <p class="text-xs uppercase tracking-[0.2em] text-slate-500 font-semibold whitespace-nowrap">${division.name}</p>
                                <h2 class="text-xl font-bold text-slate-900 mt-2 whitespace-nowrap">${division.tableLabel}</h2>
                            </div>
                            <span class="inline-flex items-center rounded-full bg-blue-50 px-3 py-1 text-xs font-semibold text-blue-700">${division.description}</span>
                        </div>
                        <ul class="space-y-2">
                            ${buildPlayerList(division.players)}
                        </ul>
                    </div>
                `;
            }).join('');

            summary.innerHTML = `
                <h2 class="text-lg font-bold text-slate-900">${half.title}</h2>
                <p class="mt-2 text-slate-600">${half.subtitle} Each division will play every other player in their division.</p>
            `;

            document.querySelectorAll('[data-half-button]').forEach(button => {
                const isActive = button.dataset.halfButton === halfKey;

                // Use your theme's primary color (bg-blue-800) for the active button
                button.classList.toggle('bg-blue-800', isActive);
                button.classList.toggle('text-white', isActive);

                // Use your theme's muted text color for the inactive button
                button.classList.toggle('text-slate-600', !isActive);
                button.classList.toggle('bg-transparent', !isActive);
            });
        }

        async function loadMatchupRoster() {
            const summary = document.getElementById('matchup-summary');
            const container = document.getElementById('matchup-container');
            summary.innerHTML = '<p class="text-slate-600">Loading roster from the club spreadsheet...</p>';
            container.innerHTML = '<div class="col-span-full text-center py-10 text-slate-400 italic">Loading roster...</div>';

            try {
                const response = await fetch(SHEET_URL);
                const csvText = await response.text();
                const rows = parseCsvRows(csvText);
                const players = rows.slice(1)
                    .map(normalizePlayer)
                    .filter(player => player.name)
                    .sort((a, b) => b.elo - a.elo);

                const half2 = buildHalfData(players.slice(0, 16));
                const half1 = buildHalfData(players.slice(16, 32));

                const matchupData = {
                    half2,
                    half1: {
                        ...half1,
                        title: 'Half 1 — Lower Half',
                        subtitle: 'Next 16 players in descending Elo order.'
                    }
                };

                document.querySelectorAll('[data-half-button]').forEach(button => {
                    const halfKey = button.dataset.halfButton;
                    button.addEventListener('click', () => renderHalfData(halfKey, matchupData[halfKey]));
                });

                renderHalfData('half2', matchupData.half2);
            } catch (error) {
                console.error('Roster fetch error:', error);
                summary.innerHTML = '<p class="text-red-500">Unable to load the roster. Please check the spreadsheet link.</p>';
                container.innerHTML = '<div class="col-span-full text-center py-10 text-red-500">Failed to load matchup roster.</div>';
            }
        }

        // Navbar toggle (shared)
        (function () {
            const rankingNavToggle = document.getElementById('rankingNavToggle');
            const rankingNavLinks = document.getElementById('rankingNavLinks');
            if (rankingNavToggle && rankingNavLinks) {
                rankingNavToggle.addEventListener('click', () => {
                    rankingNavLinks.classList.toggle('hidden');
                    const expanded = rankingNavLinks.classList.contains('hidden') ? 'false' : 'true';
                    rankingNavToggle.setAttribute('aria-expanded', expanded);
                });
            }
        })();

        document.addEventListener('DOMContentLoaded', () => {
            const half2Btn = document.getElementById('half2Btn');
            const half1Btn = document.getElementById('half1Btn');
            half2Btn.setAttribute('data-half-button', 'half2');
            half1Btn.setAttribute('data-half-button', 'half1');
            loadMatchupRoster();
        });
    </script>
</body>

</html>
