            <button id="rankingNavToggle" type="button"

                style="backface-visibility: hidden; transform: translateZ(0);"
                aria-label="Toggle navigation" aria-controls="rankingNavLinks" aria-expanded="false">
                <svg id="menu-icon" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 transition-transform duration-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                </svg>
                <svg id="close-icon" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 hidden transition-transform duration-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>

            <div id="rankingNavLinks" class="hidden w-full flex-col gap-1 mt-4 pt-4 border-t border-red-700/50 sm:flex sm:w-auto sm:flex-row sm:items-center sm:gap-2 sm:mt-0 sm:pt-0 sm:border-0 transition-all">
                <a href="player-ranking.html" class="block rounded-lg px-3 py-3 sm:py-2 bg-transparent hover:bg-white/10 transition-colors duration-200 overflow-hidden transform-gpu" style="backface-visibility: hidden; transform: translateZ(0);">
                    <svg xmlns="http://www.w3.org/2000/svg" class="inline align-middle h-5 w-5 sm:h-4 sm:w-4 mr-3 sm:mr-2" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 3v18" /><path d="M17 3v18" /><path d="M7 7h10" /><path d="M7 11h10" /><path d="M7 15h10" /></svg>Rankings</a>
                <a href="player-matchup-ladder.html" class="block rounded-lg px-3 py-3 sm:py-2 bg-transparent hover:bg-white/10 transition-colors duration-200 overflow-hidden transform-gpu" style="backface-visibility: hidden; transform: translateZ(0);">
                    <svg xmlns="http://www.w3.org/2000/svg" class="inline align-middle h-5 w-5 sm:h-4 sm:w-4 mr-3 sm:mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3M3 11h18M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>Matchups</a>
                <a href="club-analytics.html" class="block rounded-lg px-3 py-3 sm:py-2 bg-transparent hover:bg-white/10 transition-colors duration-200 overflow-hidden transform-gpu" style="backface-visibility: hidden; transform: translateZ(0);">
                    <svg xmlns="http://www.w3.org/2000/svg" class="inline align-middle h-5 w-5 sm:h-4 sm:w-4 mr-3 sm:mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3v18h18M8 7v10M12 11v6M16 5v12" /></svg>Analytics</a>
                <a href="past-records.html" class="block rounded-lg px-3 py-3 sm:py-2 bg-transparent hover:bg-white/10 transition-colors duration-200 overflow-hidden transform-gpu" style="backface-visibility: hidden; transform: translateZ(0);">
                    <svg xmlns="http://www.w3.org/2000/svg" class="inline align-middle h-5 w-5 sm:h-4 sm:w-4 mr-3 sm:mr-2" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="8" /><path d="M12 8v4" /><path d="M12 12l3 2" /></svg>Past Records</a>
                <a href="absence-report.html" class="block rounded-lg px-3 py-3 sm:py-2 bg-transparent hover:bg-white/10 transition-colors duration-200 overflow-hidden transform-gpu" style="backface-visibility: hidden; transform: translateZ(0);">
                    <svg xmlns="http://www.w3.org/2000/svg" class="inline align-middle h-5 w-5 sm:h-4 sm:w-4 mr-3 sm:mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h8M8 11h8M8 15h5" /><rect x="4" y="3" width="16" height="18" rx="2" ry="2" /></svg>Absence</a>
                <a href="rules.html" class="block rounded-lg px-3 py-3 sm:py-2 bg-transparent hover:bg-white/10 transition-colors duration-200 overflow-hidden transform-gpu" style="backface-visibility: hidden; transform: translateZ(0);">
                    <svg xmlns="http://www.w3.org/2000/svg" class="inline align-middle h-5 w-5 sm:h-4 sm:w-4 mr-3 sm:mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" /></svg>Rules</a>
                <a href="admin.html" class="block rounded-lg px-3 py-3 sm:py-2 bg-white/10 hover:bg-white/30 transition-colors duration-200 overflow-hidden transform-gpu" style="backface-visibility: hidden; transform: translateZ(0);">
                    <svg xmlns="http://www.w3.org/2000/svg" class="inline align-middle h-4 w-4 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" /></svg>Admin Portal</a>
            </div>
        </nav>
    </header>

    <!-- CHANGE 2: Added id, flex-grow, and opacity-0 -->
    <main id="main-content" class="max-w-4xl mx-auto p-6 flex-grow w-full opacity-0 transition-opacity duration-500">
        <div class="flex justify-between items-center mb-6 fade-up">
            <h1 class="text-3xl font-bold text-red-900">Weekly Matchups</h1>
            <span class="bg-white text-red-800 text-xs font-bold px-3 py-1 rounded-lg border border-slate-200 uppercase shadow-sm">Term 2 - Week 4</span>
        </div>

        <div class="flex flex-col gap-4 mb-6">
            <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-3 fade-up">
                <div>
                    <p class="text-sm uppercase tracking-[0.18em] text-slate-500 font-bold">View half</p>
                    <div class="inline-flex rounded-xl bg-white border border-slate-200 p-1 mt-2" role="group">
                        <button id="half2Btn" type="button" class="px-4 py-2 rounded-lg text-sm font-semibold transition-colors">Half 2</button>
                        <button id="half1Btn" type="button" class="px-4 py-2 rounded-lg text-sm font-semibold transition-colors">Half 1</button>
                    </div>
                </div>
                <div class="rounded-xl bg-white border border-slate-200 p-4 text-sm text-slate-600 shadow-sm">
                    <p class="font-semibold text-slate-800">Table assignments</p>
                    <p class="mt-1">Div 1 → Table 1 · Div 2 → Tables 2 &amp; 3 · Div 3 → Table 4</p>
                </div>
            </div>
            <div id="matchup-summary" class="rounded-2xl bg-white p-5 border border-slate-200 shadow-sm text-slate-700 fade-up"></div>
        </div>

        <div id="matchup-container" class="grid gap-4 md:grid-cols-2"></div>
    </main>

    <!-- CHANGE 3: Added id, mt-auto, and opacity-0 -->
    <footer id="page-footer" class="bg-slate-800 text-slate-400 mt-auto opacity-0 transition-opacity duration-500">
        <div class="max-w-6xl mx-auto flex items-center justify-between p-4 text-sm">
            <p>&copy; <span id="current-year">2024</span> NBHS Table Tennis Hub. All Rights Reserved.</p>
            <a href="#" class="hover:text-white transition-colors">Back to Top &uarr;</a>
        </div>
    </footer>

    <script>
        const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ_UHoHNgToKV4yCuB_M56029JuMrOYWN-VkyxDiWkwXHJI1hhRnon_GMnvgvmQeHmL4F0gxkVz7IMP/pub?gid=2082256240&single=true&output=csv";

        function parseCsvRows(text) {
            const rows = []; let row = []; let field = ''; let inQuotes = false;
            for (let i = 0; i < text.length; i++) { const char = text[i]; if (char === '"') { if (inQuotes && text[i + 1] === '"') { field += '"'; i++; } else { inQuotes = !inQuotes; } } else if (char === ',' && !inQuotes) { row.push(field); field = ''; } else if ((char === '\n' || char === '\r') && !inQuotes) { if (char === '\r' && text[i + 1] === '\n') i++; row.push(field); field = ''; rows.push(row); row = []; } else { field += char; } }
            if (field !== '' || row.length > 0) { row.push(field); rows.push(row); } return rows;
        }

        function normalizePlayer(row) {
            return { name: row[0] ? row[0].replace(/"/g, '').trim() : '', elo: parseInt(row[1]?.replace(/,/g, '') || '0', 10) || 0 };
        }

        function buildHalfData(players, isUpperHalf) {
            return {
                title: isUpperHalf ? 'Half 2 — Better Half' : 'Half 1 — Lower Half',
                subtitle: isUpperHalf ? 'Top 16 players in descending Elo order.' : 'Next 16 players in descending Elo order.',
                divisions: [
                    { name: 'Division 1', tableLabel: 'Table 1', description: '4 players', players: players.slice(0, 4) },
                    { name: 'Division 2', tableLabel: 'Tables 2 & 3', description: '8 players', players: players.slice(4, 12) },
                    { name: 'Division 3', tableLabel: 'Table 4', description: '4 players', players: players.slice(12, 16) }
                ]
            };
        }

        function buildPlayerList(players) {
            return players.map(player => `<li class="py-1 text-sm text-slate-700"><span class="font-semibold">${player.name}</span> <span class="text-slate-400">(${player.elo})</span></li>`).join('');
        }

        function renderHalfData(halfKey, half) {
            const container = document.getElementById('matchup-container');
            const summary = document.getElementById('matchup-summary');
            let delay = 1;

            container.innerHTML = half.divisions.map(division => {
                if (division.name === 'Division 2') {
                    const groups = [division.players.slice(0, 4), division.players.slice(4)];
                    return groups.map((group, idx) => `
                        <div class="bg-white p-5 rounded-3xl border border-slate-200 shadow-sm fade-up fade-up-d${delay++}">
                            <div class="flex items-start justify-between gap-4 mb-4">
                                <div class="min-w-0">
                                    <p class="text-xs uppercase tracking-[0.2em] text-slate-500 font-semibold">${division.name}</p>
                                    <h2 class="text-xl font-bold text-slate-900 mt-2">Table ${idx + 2}</h2>
                                </div>
                                <span class="inline-flex items-center rounded-full bg-red-50 px-3 py-1 text-xs font-semibold text-red-700">4 players</span>
                            </div>
                            <ul class="space-y-2">${buildPlayerList(group)}</ul>
                        </div>
                    `).join('');
                }
                return `
                    <div class="bg-white p-5 rounded-3xl border border-slate-200 shadow-sm fade-up fade-up-d${delay++}">
                        <div class="flex items-start justify-between gap-4 mb-4">
                            <div class="min-w-0">
                                <p class="text-xs uppercase tracking-[0.2em] text-slate-500 font-semibold">${division.name}</p>
                                <h2 class="text-xl font-bold text-slate-900 mt-2">${division.tableLabel}</h2>
                            </div>
                            <span class="inline-flex items-center rounded-full bg-red-50 px-3 py-1 text-xs font-semibold text-red-700">${division.description}</span>
                        </div>
                        <ul class="space-y-2">${buildPlayerList(division.players)}</ul>
                    </div>
                `;
            }).join('');

            summary.innerHTML = `<h2 class="text-lg font-bold text-slate-900">${half.title}</h2><p class="mt-2 text-slate-600">${half.subtitle} Each division plays a round-robin.</p>`;

            document.querySelectorAll('[data-half-button]').forEach(btn => {
                const active = btn.dataset.halfButton === halfKey;
                btn.classList.toggle('bg-red-800', active); btn.classList.toggle('text-white', active);
                btn.classList.toggle('text-slate-600', !active); btn.classList.toggle('bg-transparent', !active);
            });
        }

        async function loadMatchupRoster() {
            const mainContent = document.getElementById('main-content');
            const pageFooter = document.getElementById('page-footer');
            try {
                const response = await fetch(SHEET_URL);
                const rows = parseCsvRows(await response.text()).slice(1).map(normalizePlayer).filter(p => p.name).sort((a, b) => b.elo - a.elo);
                const matchupData = { half2: buildHalfData(rows.slice(0, 16), true), half1: buildHalfData(rows.slice(16, 32), false) };
                
                document.querySelectorAll('[data-half-button]').forEach(btn => {
                    btn.addEventListener('click', () => renderHalfData(btn.dataset.halfButton, matchupData[btn.dataset.halfButton]));
                });
                renderHalfData('half2', matchupData.half2);
            } catch (e) {
                console.error(e);
            } finally {
                mainContent.classList.remove('opacity-0');
                pageFooter.classList.remove('opacity-0');
            }
        }

        (function(){const t=document.getElementById("rankingNavToggle"),e=document.getElementById("rankingNavLinks"),n=document.getElementById("menu-icon"),o=document.getElementById("close-icon");if(t&&e)t.addEventListener("click",()=>{const s=e.classList.contains("hidden");s?(e.classList.remove("hidden"),e.classList.add("flex","animate-[fadeIn_0.2s_ease-in-out]"),n.classList.add("hidden"),o.classList.remove("hidden"),t.setAttribute("aria-expanded","true")):(e.classList.add("hidden"),e.classList.remove("flex","animate-[fadeIn_0.2s_ease-in-out]"),n.classList.remove("hidden"),o.classList.add("hidden"),t.setAttribute("aria-expanded","false"))})})();
        (function(){const y=document.getElementById('current-year'); if(y) y.textContent=new Date().getFullYear();})();

        document.addEventListener('DOMContentLoaded', () => {
            const h2 = document.getElementById('half2Btn'), h1 = document.getElementById('half1Btn');
            h2.setAttribute('data-half-button', 'half2'); h1.setAttribute('data-half-button', 'half1');
            loadMatchupRoster();
        });
    </script>
</body>
</html>
