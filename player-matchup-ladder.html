<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player Matchup Ladder - Table Tennis Club</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; margin: 0; padding: 0; }
        header { background: #333; color: white; padding: 10px; display: flex; justify-content: space-between; align-items: center; }
        nav { display: flex; gap: 20px; }
        nav a { color: white; text-decoration: none; }
        .search-bar { display: flex; }
        .search-bar input { padding: 5px; }
        .search-bar button { padding: 5px 10px; background: #555; color: white; border: none; }
        .container { width: 90%; margin: 20px auto; background: white; padding: 20px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .ladder { display: flex; flex-direction: column; align-items: center; }
        .round { display: flex; flex-direction: column; margin: 20px 0; }
        .match { background: #eee; padding: 10px; margin: 5px; border-radius: 5px; width: 200px; text-align: center; }
    </style>
</head>
<body>
    <header>
        <nav>
            <a href="my-data-portal">Home</a>
            <a href="player-ranking.html">Player Rankings</a>
            <a href="player-matchup-ladder.html">Matchup Ladder</a>
        </nav>
        <div class="search-bar">
            <input type="text" placeholder="Search players...">
            <button>Search</button>
        </div>
    </header>
    <div class="container">
        <h1>Player Matchup Ladder</h1>
        <div class="ladder">
            <div class="round">
                <div class="match">Player A vs Player B</div>
                <div class="match">Player C vs Player D</div>
            </div>
            <div class="round">
                <div class="match">Winner 1 vs Winner 2</div>
            </div>
            <!-- Add more rounds as needed -->
        </div>
    </div>
</body>
</html>
