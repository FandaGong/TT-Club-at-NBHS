<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matchup Ladder - NBHS Table Tennis</title>
    <script src="tailwind-theme.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="animations.css">
    <link rel="icon" type="image/png" href="favicon.png">
</head>

<!-- CHANGE 1: flex flex-col for sticky footer -->
<body class="site-surface text-slate-900 font-sans min-h-screen flex flex-col">

    <div id="header-placeholder"></div>

    <!-- CHANGE 2: Added id, flex-grow, and opacity-0 -->
    <main id="main-content" class="almanac flex-grow w-full transition-opacity duration-300">
      <div class="alm-shell">
        <header class="alm-masthead--compact alm-block" style="border-bottom:2px solid var(--ink);padding-bottom:1.25rem;">
            <div>
                <p class="alm-kicker">This week's draw</p>
                <h1 class="alm-display alm-display--md mt-3">Weekly<br>Matchups</h1>
            </div>
        </header>

        <section class="alm-block">
            <div class="alm-split" style="align-items:start;">
                <div>
                    <p class="alm-eyebrow" style="margin-bottom:0.6rem;">View day</p>
                    <div class="alm-toggle" role="group">
                        <button id="half2Btn" type="button">Monday</button>
                        <button id="half1Btn" type="button">Tuesday</button>
                    </div>
                </div>
                <div class="alm-panel">
                    <p class="alm-eyebrow" style="margin-bottom:0.5rem;">Table assignments</p>
                    <p class="alm-assign">Div 1 → <b>Table 1</b> · Div 2 → <b>Tables 2 &amp; 3</b> · Div 3 → <b>Table 4</b></p>
                </div>
            </div>

            <div id="matchup-summary" class="alm-panel alm-panel--ink" style="margin-top:1.25rem;"></div>

            <div id="matchup-container" class="grid gap-4 md:grid-cols-2" style="margin-top:1.25rem;"></div>
        </section>
      </div>
    </main>

    <!-- CHANGE 3: Added id, mt-auto, and opacity-0 -->
    <div id="footer-placeholder"></div>

    <script src="components.js"></script>
    <script>
        // Use Supabase `player_rankings` instead of the Google Sheets CSV
        async function getSupabaseClient() {
            if (window._supabaseClient) return window._supabaseClient;
            if (window.supabase) {
                // create a local client instance for pages that include supabase.js directly
                window._supabaseClient = window.supabase.createClient('https://ngnkbfazhdedaqvxcphw.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5nbmtiZmF6aGRlZGFxdnhjcGh3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MTE5NDksImV4cCI6MjA5MzI4Nzk0OX0.F_S6ORkFe-SuJPybs7FEFH94E6U2hZ5ern4vrg4kMOk');
                return window._supabaseClient;
            }
            if (document.readyState === 'loading') await new Promise(resolve => document.addEventListener('DOMContentLoaded', resolve));
            return window._supabaseClient;
        }

        function parseCsvRows(text) {
            const rows = []; let row = []; let field = ''; let inQuotes = false;
            for (let i = 0; i < text.length; i++) { const char = text[i]; if (char === '"') { if (inQuotes && text[i + 1] === '"') { field += '"'; i++; } else { inQuotes = !inQuotes; } } else if (char === ',' && !inQuotes) { row.push(field); field = ''; } else if ((char === '\n' || char === '\r') && !inQuotes) { if (char === '\r' && text[i + 1] === '\n') i++; row.push(field); field = ''; rows.push(row); row = []; } else { field += char; } }
            if (field !== '' || row.length > 0) { row.push(field); rows.push(row); } return rows;
        }

        function normalizePlayer(row) {
            return { name: row[0] ? row[0].replace(/"/g, '').trim() : '', elo: parseInt(row[1]?.replace(/,/g, '') || '0', 10) || 0 };
        }

        function buildHalfData(players, isUpperHalf) {
            return {
                title: isUpperHalf ? 'Monday — Top 16' : 'Tuesday — Next 16',
                subtitle: isUpperHalf ? 'Top 16 players in descending Elo order.' : 'Players 17–32 in descending Elo order.',
                divisions: [
                    { name: 'Division 1', tableLabel: 'Table 1', description: '4 players', players: players.slice(0, 4) },
                    { name: 'Division 2', tableLabel: 'Tables 2 & 3', description: '8 players', players: players.slice(4, 12) },
                    { name: 'Division 3', tableLabel: 'Table 4', description: '4 players', players: players.slice(12, 16) }
                ]
            };
        }

        function buildPlayerList(players) {
            return players.map((player, i) => `
                <li>
                    <span class="alm-division-seed">${String(i + 1).padStart(2, '0')}</span>
                    <a href="player-analysis.html?name=${encodeURIComponent(player.name)}" class="alm-division-player alm-ldr-name">${player.name}</a>
                    <span class="alm-division-elo">${player.elo}</span>
                </li>`).join('');
        }

        function divisionCard(name, tableLabel, count, players) {
            return `
                <div class="alm-division">
                    <div class="alm-division-head">
                        <span class="alm-division-name">${name}</span>
                        <span class="alm-division-table">${tableLabel} · ${count}</span>
                    </div>
                    <ul class="alm-division-list">${buildPlayerList(players)}</ul>
                </div>`;
        }

        function renderHalfData(halfKey, half) {
            const container = document.getElementById('matchup-container');
            const summary = document.getElementById('matchup-summary');

            container.innerHTML = half.divisions.map(division => {
                if (division.name === 'Division 2') {
                    const groups = [division.players.slice(0, 4), division.players.slice(4)];
                    return groups.map((group, idx) =>
                        divisionCard(division.name, `Table ${idx + 2}`, '4 players', group)
                    ).join('');
                }
                return divisionCard(division.name, division.tableLabel, division.description, division.players);
            }).join('');

            summary.innerHTML = `<p class="alm-eyebrow">${half.title}</p><p class="alm-lede mt-2" style="color:#e9e3d6;max-width:none;">${half.subtitle} Each division plays a round-robin.</p>`;

            document.querySelectorAll('[data-half-button]').forEach(btn => {
                btn.classList.toggle('is-active', btn.dataset.halfButton === halfKey);
            });
        }

        async function loadMatchupRoster() {
            const mainContent = document.getElementById('main-content');
            const pageFooter = document.getElementById('page-footer');
            try {
                const supabase = await getSupabaseClient();
                if (!supabase) throw new Error('Supabase client not available');
                const { data, error } = await supabase.from('player_rankings').select('name,elo').order('elo', { ascending: false });
                if (error) throw error;
                const rows = (data || [])
                    .map(r => ({ name: r.name, elo: r.elo }))
                    .filter(p => p.name)
                    .sort((a, b) => {
                        const eloDiff = (b.elo || 0) - (a.elo || 0);
                        if (eloDiff !== 0) return eloDiff;
                        const aOscar = (a.name || '').toLowerCase().replace(/[^a-z0-9]+/g, '') === 'oscarpan';
                        const bOscar = (b.name || '').toLowerCase().replace(/[^a-z0-9]+/g, '') === 'oscarpan';
                        if (aOscar !== bOscar) return aOscar ? -1 : 1;
                        return (a.name || '').localeCompare(b.name || '');
                    });
                const matchupData = { half2: buildHalfData(rows.slice(0, 16), true), half1: buildHalfData(rows.slice(16, 32), false) };

                document.querySelectorAll('[data-half-button]').forEach(btn => {
                    btn.addEventListener('click', () => renderHalfData(btn.dataset.halfButton, matchupData[btn.dataset.halfButton]));
                });
                renderHalfData('half2', matchupData.half2);
            } catch (e) {
                console.error(e);
                document.getElementById('matchup-container').innerHTML = '<div class="col-span-full p-6 text-red-500">Error loading matchups.</div>';
            } finally {
                mainContent.classList.remove('opacity-0');
                pageFooter.classList.remove('opacity-0');
            }
        }

        (function(){const t=document.getElementById("rankingNavToggle"),e=document.getElementById("rankingNavLinks"),n=document.getElementById("menu-icon"),o=document.getElementById("close-icon");if(t&&e)t.addEventListener("click",()=>{const s=e.classList.contains("hidden");s?(e.classList.remove("hidden"),e.classList.add("flex","animate-[fadeIn_0.2s_ease-in-out]"),n.classList.add("hidden"),o.classList.remove("hidden"),t.setAttribute("aria-expanded","true")):(e.classList.add("hidden"),e.classList.remove("flex","animate-[fadeIn_0.2s_ease-in-out]"),n.classList.remove("hidden"),o.classList.add("hidden"),t.setAttribute("aria-expanded","false"))})})();
        (function(){const y=document.getElementById('current-year'); if(y) y.textContent=new Date().getFullYear();})();

        document.addEventListener('DOMContentLoaded', () => {
            const h2 = document.getElementById('half2Btn'), h1 = document.getElementById('half1Btn');
            h2.setAttribute('data-half-button', 'half2'); h1.setAttribute('data-half-button', 'half1');
            loadMatchupRoster();
        });
    </script>
<script>
(function() {
    if (window.__nbhsNavLoginTextInit__) return;
    window.__nbhsNavLoginTextInit__ = true;

    const adminUrl = 'admin.html';
    const defaultLabel = 'Login';
    const profileLabel = 'Profile';
    const adminLabel = 'Admin Portal';
    const adminAllowlist = [];
    const supabaseUrl = 'https://ngnkbfazhdedaqvxcphw.supabase.co';
    const supabaseAnonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5nbmtiZmF6aGRlZGFxdnhjcGh3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MTE5NDksImV4cCI6MjA5MzI4Nzk0OX0.F_S6ORkFe-SuJPybs7FEFH94E6U2hZ5ern4vrg4kMOk';

    const loginLink = document.getElementById('navLoginLink');
    if (!loginLink) return;
    let loginText = document.getElementById('navLoginLinkText');
    if (!loginText) {
        loginText = document.createElement('span');
        loginText.id = 'navLoginLinkText';
        loginText.style.opacity = '0';
        loginText.textContent = '';
        loginLink.appendChild(loginText);
    }

    function setLabel(label) {
        loginText.textContent = label;
        loginText.style.opacity = '1';
    }

    async function updateLabel(session) {
        const email = session?.user?.email?.toLowerCase();
        if (!email) {
            setLabel(defaultLabel);
            return;
        }
        try {
            if (window._resolveAccountRole) {
                const role = await window._resolveAccountRole(email);
                setLabel(role === 'admin' ? adminLabel : profileLabel);
                return;
            }
        } catch (err) {
            // ignore and fallback
        }
        setLabel(adminAllowlist.includes(email) ? adminLabel : profileLabel);
    }

    function initializeSupabase() {
        if (!window.supabase) {
            const script = document.createElement('script');
            script.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2';
            script.onload = initializeSupabase;
            document.head.appendChild(script);
            return;
        }

        const client = window.supabase.createClient(supabaseUrl, supabaseAnonKey);
        client.auth.getSession().then(({ data }) => updateLabel(data?.session)).catch(() => setLabel(defaultLabel));
        client.auth.onAuthStateChange((_event, session) => updateLabel(session));
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initializeSupabase);
    } else {
        initializeSupabase();
    }
})();
</script>
</body>
</html>
