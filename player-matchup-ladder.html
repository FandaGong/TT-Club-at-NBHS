<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matchup Ladder - NBHS Table Tennis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/png" href="favicon.png">
</head>
<body class="bg-slate-50 text-slate-900 font-sans min-h-screen">

    <header class="bg-blue-800 text-white p-4 shadow-md">
        <nav class="max-w-4xl mx-auto flex gap-6">
            <a href="index.html" class="hover:underline">Home</a>
            <a href="player-ranking.html" class="hover:underline">Rankings</a>
            <a href="player-matchup-ladder.html" class="font-bold border-b-2 border-white">Matchups</a>
        </nav>
    </header>

    <main class="max-w-4xl mx-auto p-6">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-3xl font-bold text-blue-900">Weekly Matchups</h1>
            <span class="bg-blue-100 text-blue-800 text-xs font-bold px-3 py-1 rounded-full uppercase">
                Term 2 Session
            </span>
        </div>

        <div id="matchup-container" class="grid gap-4 md:grid-cols-2">
            <div class="col-span-full text-center py-10 text-slate-400 italic">
                Syncing with Google Sheets...
            </div>
        </div>

        <footer class="mt-20 border-t border-slate-200 pt-6 mb-10 text-center">
            <p id="update-timestamp" class="text-xs text-slate-400 uppercase font-semibold tracking-wider">
                Last Sync: Loading...
            </p>
        </footer>
    </main>

    <script>
        // Make sure the GID matches your 'Matchups' tab exactly
        const MATCHUP_SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ_UHoHNgToKV4yCuB_M56029JuMrOYWN-VkyxDiWkwXHJI1hhRnon_GMnvgvmQeHmL4F0gxkVz7IMP/pub?gid=YOUR_MATCHUP_TAB_GID_HERE&single=true&output=csv";

        async function loadMatchups() {
            try {
                const response = await fetch(MATCHUP_SHEET_URL);
                const data = await response.text();
                const rows = data.split('\n').map(r => r.trim()).filter(r => r.length > 0);

                // Assuming Sheet Columns: Court, Player1, Player2, Half/Group
                const matchups = rows.slice(1).map(row => {
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    const clean = (v) => (v || "").replace(/"/g, '').trim();
                    return {
                        court: clean(cols[0]),
                        p1: clean(cols[1]),
                        p2: clean(cols[2]),
                        half: clean(cols[3])
                    };
                }).filter(m => m.p1 && m.p2); 

                const container = document.getElementById('matchup-container');
                
                if (matchups.length === 0) {
                    container.innerHTML = `<p class="col-span-full text-center text-slate-500 py-10">No matchups scheduled for this session yet.</p>`;
                } else {
                    container.innerHTML = matchups.map(m => `
                        <div class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm flex justify-between items-center hover:border-blue-300 transition-colors">
                            <div>
                                <span class="text-[10px] font-bold text-blue-600 uppercase tracking-widest">
                                    Court ${m.court} ${m.half ? '• ' + m.half : ''}
                                </span>
                                <p class="text-lg font-bold text-slate-800 mt-1">
                                    ${m.p1} <span class="text-slate-400 font-normal mx-1 text-sm italic">vs</span> ${m.p2}
                                </p>
                            </div>
                            <div class="bg-slate-50 p-2 rounded-lg text-xl">🏓</div>
                        </div>
                    `).join('');
                }

                const now = new Date();
                document.getElementById('update-timestamp').innerText = "Last Sync: " + now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) + " AEST";

            } catch (err) {
                console.error("Matchup load error:", err);
                document.getElementById('matchup-container').innerHTML = `<p class="text-red-500 text-center col-span-full italic">Unable to load matchups. Check sheet GID.</p>`;
            }
        }

        window.onload = loadMatchups;
    </script>
</body>
</html>
