<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player Analysis - NBHS TT</title>
    <script src="tailwind-theme.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="animations.css">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="icon" type="image/png" href="favicon.png">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Keep analysis cards neutral on hover instead of blue outline */
        main .rounded-2xl:hover {
            border-color: #e2e8f0;
        }
    </style>
</head>

<body class="site-surface text-slate-900 min-h-screen flex flex-col">
    <div id="header-placeholder"></div>

    <main class="almanac flex-grow w-full">
      <div class="alm-shell">
        <header id="player-header" class="alm-masthead--compact alm-block" style="border-bottom:2px solid var(--ink);padding-bottom:1.25rem;align-items:flex-start;">
            <div style="display:flex;align-items:center;gap:1.1rem;">
                <div id="player-avatar" class="hidden" style="height:74px;width:74px;border-radius:9999px;overflow:hidden;border:2px solid var(--ink);flex-shrink:0;">
                    <img id="player-avatar-img" alt="Profile picture" style="height:100%;width:100%;object-fit:cover;">
                </div>
                <div>
                    <p class="alm-kicker">Player Profile</p>
                    <h1 id="player-name" class="alm-display alm-display--md mt-3">Loading…</h1>
                    <div id="player-tags" class="alm-ldr-tags" style="margin-left:0;margin-top:0.6rem;"></div>
                </div>
            </div>
            <div id="quick-stats" class="alm-masthead-meta" style="margin-top:0;border-top:none;padding-top:0;"></div>
        </header>

        <section id="bio-section" class="alm-block hidden">
            <div class="alm-rule-head"><h2 class="alm-section-title">Biography</h2></div>
            <div class="alm-panel">
                <p id="bio-text" class="alm-lede" style="margin:0;white-space:pre-wrap;">—</p>
            </div>
        </section>

        <section class="alm-block">
            <div class="alm-rule-head"><h2 class="alm-section-title">Elo Progress</h2></div>
            <div class="alm-panel">
                <div class="relative h-[300px] w-full">
                    <canvas id="eloChart"></canvas>
                </div>
            </div>
        </section>

        <section class="alm-block">
            <div class="alm-rule-head"><h2 class="alm-section-title">Match History</h2></div>
            <div class="alm-ldr-record">
                <table class="alm-ladder">
                    <thead>
                        <tr>
                            <th>Opponent</th>
                            <th class="ctr">Result</th>
                            <th class="ctr">Score</th>
                            <th class="num">Δ Elo</th>
                        </tr>
                    </thead>
                    <tbody id="history-table">
                        <tr><td colspan="4" style="padding:2.5rem;text-align:center;color:var(--ink-faint);">Loading matches…</td></tr>
                    </tbody>
                </table>
            </div>
        </section>
      </div>
    </main>
    <div id="footer-placeholder"></div>

    <script src="components.js"></script>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const playerName = urlParams.get('name');

        // Use Supabase tables `player_rankings` and `match_history` instead of Google Sheets
        async function getSupabaseClient() {
            if (window._supabaseClient) return window._supabaseClient;
            if (window.supabase) {
                window._supabaseClient = window.supabase.createClient('https://ngnkbfazhdedaqvxcphw.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5nbmtiZmF6aGRlZGFxdnhjcGh3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MTE5NDksImV4cCI6MjA5MzI4Nzk0OX0.F_S6ORkFe-SuJPybs7FEFH94E6U2hZ5ern4vrg4kMOk');
                return window._supabaseClient;
            }
            if (document.readyState === 'loading') await new Promise(resolve => document.addEventListener('DOMContentLoaded', resolve));
            return window._supabaseClient;
        }
        const PLAYER_TAGS = {
            'jonathan zhao': ['Website Feature Dev', 'Club Runner'],
            'damon yuan': ['Club Runner'],
            'fanda gong': ['Club Runner', 'Main Owner'],
            'oscar pan': ['Coach'],
            'mr siu': ['Teacher Supervisor']
        };

        function parseCsv(text) {
            const rows = [];
            let row = [];
            let field = '';
            let inQuotes = false;
            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                if (char === '"') {
                    if (inQuotes && text[i + 1] === '"') { field += '"'; i++; }
                    else { inQuotes = !inQuotes; }
                } else if (char === ',' && !inQuotes) { row.push(field); field = ''; }
                else if ((char === '\n' || char === '\r') && !inQuotes) {
                    if (char === '\r' && text[i + 1] === '\n') i++;
                    row.push(field); field = ''; rows.push(row); row = [];
                } else { field += char; }
            }
            if (field !== '' || row.length > 0) { row.push(field); rows.push(row); }
            return rows;
        }

        function getPlayerTags(name) {
            return PLAYER_TAGS[(name || '').trim().toLowerCase()] || [];
        }

        function renderPlayerTags(name) {
            return getPlayerTags(name).map(tag => `<span>${tag}</span>`).join('');
        }

        async function init() {
            if (!playerName) {
                document.getElementById('player-name').innerText = 'Select a Player';
                document.getElementById('player-tags').innerHTML = '';
                document.getElementById('quick-stats').innerHTML = '<span class="alm-eyebrow">Open Rankings and choose a player to view their stats.</span>';
                document.getElementById('history-table').innerHTML = `<tr><td colspan="4" style="padding:2.5rem;text-align:center;color:var(--ink-faint);">No player selected. Open this page from the Rankings list.</td></tr>`;
                return;
            }
            document.getElementById('player-name').innerText = playerName;
            document.getElementById('player-tags').innerHTML = renderPlayerTags(playerName);
            await loadPlayerStats();
            await loadBio();
            await loadCombinedHistory();
        }

        async function loadBio() {
            try {
                const supabase = await getSupabaseClient();
                if (!supabase) return;
                // Match the viewed player's account by display name (case-insensitive).
                const { data, error } = await supabase.from('account').select('display_name, bio, avatar_url').ilike('display_name', playerName);
                if (error) return; // column/table may not exist yet — fail quietly
                const row = (data || [])[0];
                const bio = (row?.bio || '').toString().trim();
                if (bio) {
                    document.getElementById('bio-text').textContent = bio;
                    document.getElementById('bio-section').classList.remove('hidden');
                }
                const avatarUrl = (row?.avatar_url || '').toString().trim();
                if (avatarUrl) {
                    const img = document.getElementById('player-avatar-img');
                    const wrap = document.getElementById('player-avatar');
                    if (img && wrap) { img.src = avatarUrl; wrap.classList.remove('hidden'); }
                }
            } catch (err) { /* fail quietly */ }
        }

        async function loadPlayerStats() {
            try {
                const supabase = await getSupabaseClient();
                if (!supabase) throw new Error('Supabase client not available');
                const { data, error } = await supabase.from('player_rankings').select('name,elo,wins,losses,division,half').ilike('name', playerName);
                if (error) throw error;
                const found = (data || [])[0];
                if (found) {
                    const elo = found.elo || 0;
                    const wins = found.wins || 0;
                    const losses = found.losses || 0;
                    const division = found.division || 'N/A';
                    const half = found.half || 'N/A';
                    const dayLabel = (() => {
                        const k = (found.half || '').toString().trim().toLowerCase();
                        if (!k) return 'N/A';
                        if (k.includes('mon')) return 'Monday';
                        if (k.includes('tue')) return 'Tuesday';
                        if (k.includes('second') || k === '2' || k.includes('2nd')) return 'Monday';
                        if (k.includes('first') || k === '1' || k.includes('1st')) return 'Tuesday';
                        return found.half;
                    })();
                    document.getElementById('quick-stats').innerHTML = `
                        <div class="alm-stat"><span class="alm-stat-num" style="color:var(--oxblood);">${elo}</span><span class="alm-stat-label">Elo</span></div>
                        <div class="alm-stat"><span class="alm-stat-num" style="color:#2f6b3a;">${wins}</span><span class="alm-stat-label">Wins</span></div>
                        <div class="alm-stat"><span class="alm-stat-num">${losses}</span><span class="alm-stat-label">Losses</span></div>
                        <div class="alm-stat"><span class="alm-stat-num" style="font-size:1.1rem;">${division}</span><span class="alm-stat-label">Division</span></div>
                        <div class="alm-stat"><span class="alm-stat-num" style="font-size:1.1rem;">${dayLabel}</span><span class="alm-stat-label">Day</span></div>
                    `;
                }
            } catch (err) { console.error("Stats load error:", err); }
        }

        async function loadCombinedHistory() {
            try {
                const supabase = await getSupabaseClient();
                if (!supabase) throw new Error('Supabase client not available');
                const { data: allRows, error } = await supabase.from('match_history').select('*').order('created_at', { ascending: true });
                if (error) throw error;

                const rows = (allRows || []).filter(r => r.player_1 || r.player_2);
                const playerMatches = rows.filter(cols => {
                    const p1 = (cols.player_1 || '').toLowerCase().trim();
                    const p2 = (cols.player_2 || '').toLowerCase().trim();
                    return p1 === playerName.toLowerCase() || p2 === playerName.toLowerCase();
                });

                const table = document.getElementById('history-table');
                const eloProgress = [1000];
                const labels = ['Start'];

                if (playerMatches.length === 0) {
                    table.innerHTML = `<tr><td colspan="4" style="padding:2.5rem;text-align:center;color:var(--ink-faint);">No matches found in history.</td></tr>`;
                    renderChart(eloProgress, labels);
                    return;
                }

                table.innerHTML = playerMatches.slice().reverse().map(cols => {
                    const isP1 = (cols.player_1 || '').toLowerCase() === playerName.toLowerCase();
                    const opponent = isP1 ? cols.player_2 : cols.player_1;
                    const winner = (cols.winner || '').trim();
                    const score = (cols.score || '').trim();

                    let delta = isP1 ? String(cols.p1_elo_change || '') : String(cols.p2_elo_change || '');
                    delta = delta.toString().trim();
                    if (!delta.startsWith('+') && !delta.startsWith('-') && delta !== '0') {
                        delta = parseInt(delta) > 0 ? '+' + delta : delta;
                    }

                    const hasWon = (winner || '').toLowerCase() === playerName.toLowerCase();
                    const deltaColor = (delta || '').includes('+') ? '#2f6b3a' : 'var(--oxblood)';

                    return `
                <tr>
                    <td><a href="player-analysis.html?name=${encodeURIComponent(opponent)}" class="alm-ldr-name">${opponent}</a></td>
                    <td class="ctr"><span class="alm-match-tag ${hasWon ? 'win' : 'loss'}">${hasWon ? 'Win' : 'Loss'}</span></td>
                    <td class="ctr"><span class="alm-ldr-num">${score}</span></td>
                    <td class="num"><span class="alm-ldr-num" style="color:${deltaColor};">${delta}</span></td>
                </tr>`;
                }).join('');

                playerMatches.forEach((cols, index) => {
                    const isP1 = (cols.player_1 || '').toLowerCase() === playerName.toLowerCase();
                    const newElo = isP1 ? cols.p1_new_elo : cols.p2_new_elo;
                    if (newElo) {
                        eloProgress.push(parseInt(newElo));
                        labels.push(`Match ${index + 1}`);
                    }
                });

                renderChart(eloProgress, labels);

            } catch (err) {
                console.error("History error:", err);
            }
        }

        function renderChart(historyData, labels) {
            const ctx = document.getElementById('eloChart').getContext('2d');
            if (window.myChart) { window.myChart.destroy(); }

            window.myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Elo Rating',
                        data: historyData,
                        borderColor: '#7c1d1d',
                        borderWidth: 3,
                        pointBackgroundColor: '#7c1d1d',
                        tension: 0.3,
                        fill: true,
                        backgroundColor: 'rgba(124, 29, 29, 0.1)'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false, // This allows the CSS height to take control
                    scales: {
                        y: {
                            beginAtZero: false,
                            ticks: { font: { weight: 'bold' } }
                        }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }
        init();
    </script>
    <script>
        // Navbar toggle logic for Player Analysis page
        (function () {
            const rankingNavToggle = document.getElementById('rankingNavToggle');
            const rankingNavLinks = document.getElementById('rankingNavLinks');
            const menuIcon = document.getElementById('menu-icon');
            const closeIcon = document.getElementById('close-icon');

            if (rankingNavToggle && rankingNavLinks) {
                rankingNavToggle.addEventListener('click', () => {
                    const isHidden = rankingNavLinks.classList.contains('hidden');

                    if (isHidden) {
                        // Open Menu
                        rankingNavLinks.classList.remove('hidden');
                        rankingNavLinks.classList.add('flex', 'animate-[fadeIn_0.2s_ease-in-out]');

                        // Swap Icons
                        menuIcon.classList.add('hidden');
                        closeIcon.classList.remove('hidden');

                        // Update ARIA for screen readers
                        rankingNavToggle.setAttribute('aria-expanded', 'true');
                    } else {
                        // Close Menu
                        rankingNavLinks.classList.add('hidden');
                        rankingNavLinks.classList.remove('flex', 'animate-[fadeIn_0.2s_ease-in-out]');

                        // Swap Icons
                        menuIcon.classList.remove('hidden');
                        closeIcon.classList.add('hidden');

                        rankingNavToggle.setAttribute('aria-expanded', 'false');
                    }
                });
            }
        })();
        (function () {
            const yearEl = document.getElementById('current-year');
            if (yearEl) {
                yearEl.textContent = new Date().getFullYear();
            }
        })();
    </script>

<script>
(function() {
    if (window.__nbhsNavLoginTextInit__) return;
    window.__nbhsNavLoginTextInit__ = true;

    const defaultLabel = 'Login';
    const profileLabel = 'Profile';
    const adminLabel = 'Admin Portal';
    const adminAllowlist = ['nbhsttclub@gmail.com'];
    const supabaseUrl = 'https://ngnkbfazhdedaqvxcphw.supabase.co';
    const supabaseAnonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5nbmtiZmF6aGRlZGFxdnhjcGh3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MTE5NDksImV4cCI6MjA5MzI4Nzk0OX0.F_S6ORkFe-SuJPybs7FEFH94E6U2hZ5ern4vrg4kMOk';

    const loginLink = document.getElementById('navLoginLink');
    if (!loginLink) return;
    let loginText = document.getElementById('navLoginLinkText');
    if (!loginText) {
        loginText = document.createElement('span');
        loginText.id = 'navLoginLinkText';
        loginText.style.opacity = '0';
        loginText.textContent = '';
        loginLink.appendChild(loginText);
    }

    function setLabel(label) {
        loginText.textContent = label;
        loginText.style.opacity = '1';
    }

    function updateLabel(session) {
        const email = session?.user?.email?.toLowerCase();
        if (!email) {
            setLabel(defaultLabel);
            return;
        }
        setLabel(adminAllowlist.includes(email) ? adminLabel : profileLabel);
    }

    function initializeSupabase() {
        if (!window.supabase) {
            const script = document.createElement('script');
            script.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2';
            script.onload = initializeSupabase;
            document.head.appendChild(script);
            return;
        }

        const client = window.supabase.createClient(supabaseUrl, supabaseAnonKey);
        client.auth.getSession().then(({ data }) => updateLabel(data?.session)).catch(() => setLabel(defaultLabel));
        client.auth.onAuthStateChange((_event, session) => updateLabel(session));
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initializeSupabase);
    } else {
        initializeSupabase();
    }
})();
</script>

</body>

</html>
