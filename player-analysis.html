<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player Analysis - NBHS TT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-slate-50 text-slate-900 min-h-screen">
    <nav class="bg-blue-800 text-white shadow-md">
        <div class="max-w-4xl mx-auto flex items-center justify-between gap-4 px-4 py-4">
            <a href="index.html" class="text-xl font-bold">NBHS TT Hub</a>
            <button id="navToggle" type="button"
                class="sm:hidden inline-flex h-10 w-10 items-center justify-center rounded-xl border border-white/20 bg-blue-900/20 text-white hover:bg-blue-900/40"
                aria-label="Toggle navigation" onclick="document.getElementById('navLinks').classList.toggle('hidden')">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8h16M4 16h16" />
                </svg>
            </button>
            <div id="navLinks"
                class="hidden w-full flex-col gap-3 pt-4 sm:flex sm:w-auto sm:flex-row sm:items-center sm:pt-0">
                <a href="player-ranking.html" class="block hover:underline">Rankings</a>
                <a href="player-matchup-ladder.html" class="block hover:underline">Matchups</a>
                <a href="club-analytics.html" class="block hover:underline">Analytics</a>
                <a href="past-records.html" class="block hover:underline">Past Records</a>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-6">
        <div id="player-header" class="mb-8">
            <h1 id="player-name" class="text-4xl font-black text-blue-900 uppercase italic">Loading...</h1>
            <div id="quick-stats" class="flex gap-6 mt-4 font-bold"></div>
        </div>

        <div class="bg-white p-6 rounded-2xl border mb-8 shadow-sm">
            <h2 class="text-lg font-bold mb-4 uppercase text-slate-500 italic">Elo Progress</h2>
            <canvas id="eloChart" height="100"></canvas>
        </div>

        <div class="bg-white rounded-2xl border shadow-sm overflow-x-auto">
            <h2 class="p-4 bg-slate-50 border-b font-bold uppercase text-slate-500">Match History</h2>
            <table class="w-full min-w-max text-left">
                <thead class="bg-slate-50 text-xs uppercase font-bold text-slate-400">
                    <tr>
                        <th class="p-4">Opponent</th>
                        <th class="p-4">Result</th>
                        <th class="p-4 text-center">Score</th>
                        <th class="p-4 text-right">Δ Elo</th>
                    </tr>
                </thead>
                <tbody id="history-table">
                    <tr>
                        <td colspan="4" class="p-10 text-center italic text-slate-400">Loading matches...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const playerName = urlParams.get('name');

        // GIDs for your specific tabs
        const STATS_GID = "2082256240";
        const MATCHES_GID = "859312421";
        const BASE_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ_UHoHNgToKV4yCuB_M56029JuMrOYWN-VkyxDiWkwXHJI1hhRnon_GMnvgvmQeHmL4F0gxkVz7IMP/pub?output=csv&gid=";

        function parseCsv(text) {
            const rows = [];
            let row = [];
            let field = '';
            let inQuotes = false;

            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                if (char === '"') {
                    if (inQuotes && text[i + 1] === '"') {
                        field += '"';
                        i++;
                    } else {
                        inQuotes = !inQuotes;
                    }
                } else if (char === ',' && !inQuotes) {
                    row.push(field);
                    field = '';
                } else if ((char === '\n' || char === '\r') && !inQuotes) {
                    if (char === '\r' && text[i + 1] === '\n') i++;
                    row.push(field);
                    field = '';
                    rows.push(row);
                    row = [];
                } else {
                    field += char;
                }
            }

            if (field !== '' || row.length > 0) {
                row.push(field);
                rows.push(row);
            }

            return rows;
        }

        async function init() {
            if (!playerName) return;
            document.getElementById('player-name').innerText = playerName;

            await loadPlayerStats();
            await loadMatchHistory();
        }

        async function loadPlayerStats() {
            try {
                const resp = await fetch(BASE_URL + STATS_GID);
                const data = await resp.text();
                const rows = parseCsv(data).filter(row => row.length > 0);

                // Find the player in the Players Sheet by exact name match in column 0
                const found = rows.find(row => (row[0] || '').toLowerCase() === playerName.toLowerCase());

                if (found) {
                    const cols = found;
                    const cleanStat = (val) => {
                        // 1. Remove quotes, commas, and whitespace
                        let cleaned = (val || "").toString().replace(/"/g, '').replace(/,/g, '').trim();

                        // 2. If it's empty, "undefined", "null", or just whitespace, return "0"
                        if (!cleaned || cleaned.toLowerCase() === "undefined" || cleaned.toLowerCase() === "null") {
                            return "0";
                        }

                        return cleaned;
                    };

                    // Apply to your stats
                    const elo = cleanStat(cols[1]);
                    const wins = cleanStat(cols[2]);
                    const losses = cleanStat(cols[3]);
                    const division = (cols[4] || "N/A").replace(/"/g, '').trim();
                    const half = (cols[5] || "N/A").replace(/"/g, '').trim();

                    document.getElementById('quick-stats').innerHTML = `
    <div class="mt-4 flex flex-wrap gap-6 font-black uppercase italic tracking-tighter">
        <span class="text-blue-700">ELO: ${elo}</span>
        <span class="text-green-600">WINS: ${wins}</span>
        <span class="text-red-500">LOSSES: ${losses}</span>
        <div class="border-l border-slate-300 pl-6 flex gap-4 text-slate-400">
            <span>${division}</span>
            <span>${half} HALF</span>
        </div>
    </div>
`;

                    // Graph placeholder
                    renderChart([1000, parseInt(elo)]);
                }
            } catch (err) {
                console.error("Stats load error:", err);
            }
        }

        async function loadMatchHistory() {
            try {
                const resp = await fetch(BASE_URL + MATCHES_GID);
                if (!resp.ok) throw new Error("Could not reach Google Sheets");

                const data = await resp.text();
                const rows = parseCsv(data).filter(row => row.length > 0);

                // Filter for matches involving the player
                const history = rows.slice(1).filter(cols => {
                    const p1 = (cols[0] || "").toLowerCase().trim();
                    const p2 = (cols[1] || "").toLowerCase().trim();
                    const target = playerName.toLowerCase().trim();
                    return p1 === target || p2 === target;
                });

                const table = document.getElementById('history-table');

                if (history.length === 0) {
                    table.innerHTML = `<tr><td colspan="4" class="p-10 text-center text-slate-400">No recent match history found.</td></tr>`;
                    return;
                }

                // We reverse the history so the most recent matches show at the top
                table.innerHTML = history.reverse().map(cols => {
                    const p1 = cols[0].replace(/"/g, '').trim();
                    const p2 = cols[1].replace(/"/g, '').trim();
                    const winner = cols[2].replace(/"/g, '').trim();
                    const score = cols[3].replace(/"/g, '').trim();

                    // Delta Elo columns (I and J -> Index 8 and 9)
                    const p1Delta = (cols[8] || "").trim();
                    const p2Delta = (cols[9] || "").trim();

                    const isP1 = p1.toLowerCase() === playerName.toLowerCase();
                    const opponent = isP1 ? p2 : p1;

                    // Determine result
                    const hasWon = winner.toLowerCase() === playerName.toLowerCase();

                    // Get the specific delta for this player
                    const delta = isP1 ? p1Delta : p2Delta;

                    // Styling for the Delta
                    const isPositive = delta.includes('+');
                    const deltaColor = isPositive ? 'text-blue-600' : 'text-orange-600';

                    return `
        <tr class="border-b hover:bg-slate-50 transition-colors">
            <td class="p-4">
                <span class="font-bold text-slate-800">${opponent}</span>
            </td>
            <td class="p-4">
                <span class="px-2 py-1 rounded text-[10px] font-black ${hasWon ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">
                    ${hasWon ? 'WIN' : 'LOSS'}
                </span>
            </td>
            <td class="p-4 text-center font-mono font-bold text-slate-600">${score}</td>
            <td class="p-4 text-right font-bold ${deltaColor}">
                ${delta || '--'}
            </td>
        </tr>`;
                }).join('');

            } catch (err) {
                console.error(err);
                document.getElementById('history-table').innerHTML = `<tr><td colspan="4" class="p-10 text-center text-red-500 font-bold">Failed to sync match data.</td></tr>`;
            }
        }
        function renderChart(historyData) {
            const ctx = document.getElementById('eloChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: historyData.map((_, i) => `Match ${i}`),
                    datasets: [{
                        label: 'Elo Rating',
                        data: historyData,
                        borderColor: '#1e3a8a',
                        tension: 0.3,
                        fill: true,
                        backgroundColor: 'rgba(30, 58, 138, 0.1)'
                    }]
                },
                options: { plugins: { legend: { display: false } } }
            });
        }

        init();
    </script>
</body>

</html>
