<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBHS Table Tennis Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/png" href="favicon.png">
</head>
<body class="bg-slate-50 text-slate-900 font-sans min-h-screen">

    <nav class="bg-blue-800 text-white p-4 shadow-md">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <a href="index.html" class="text-xl font-bold">NBHS TT Hub</a>
            <div class="space-x-4">
                <a href="player-ranking.html" class="hover:text-blue-200 uppercase font-semibold text-sm">Ranking</a>
                <a href="player-matchup-ladder.html" class="hover:text-blue-200 uppercase font-semibold text-sm">Matchups</a>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-6">
        <div class="text-center py-10">
            <h1 class="text-4xl font-extrabold text-blue-900">Welcome, Players.</h1>
            <p class="text-slate-600 mt-2">Access the official Normanhurst Boys Table Tennis ranking system.</p>
        </div>

        <section class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 mb-10">
            <h2 class="text-lg font-bold mb-4 italic text-blue-800 uppercase tracking-wide">Quick Player Search</h2>
            <form id="searchForm" class="flex gap-2">
                <input type="text" id="searchInput" placeholder="Enter name (e.g. Fanda)..." 
                    class="flex-1 p-3 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                <button type="submit" class="bg-blue-600 text-white px-6 py-3 rounded-xl font-bold hover:bg-blue-700 transition-colors">Search</button>
            </form>
            <div id="searchResult" class="hidden mt-6 p-4 bg-blue-50 border border-blue-100 rounded-xl"></div>
        </section>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <a href="player-ranking.html" class="bg-white p-8 rounded-2xl border hover:border-blue-500 transition-all shadow-sm text-center">
                <span class="text-3xl mb-2 block">🏆</span>
                <h3 class="font-bold text-xl">View Ranking Ladder</h3>
                <p class="text-slate-500 text-sm italic">Current Elo ratings and club standings.</p>
            </a>
            <a href="player-matchup-ladder.html" class="bg-white p-8 rounded-2xl border hover:border-blue-500 transition-all shadow-sm text-center">
                <span class="text-3xl mb-2 block">📅</span>
                <h3 class="font-bold text-xl">Weekly Matchups</h3>
                <p class="text-slate-500 text-sm italic">Session court placements.</p>
            </a>
        </div>
    </main>

    <script>
        const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ_UHoHNgToKV4yCuB_M56029JuMrOYWN-VkyxDiWkwXHJI1hhRnon_GMnvgvmQeHmL4F0gxkVz7IMP/pub?output=csv&gid=2082256240";
        let players = [];

        async function loadData() {
            try {
                const response = await fetch(SHEET_URL);
                const data = await response.text();
                const rows = data.split('\n').map(row => row.trim()).filter(row => row.length > 0);
                players = rows.slice(1).map(row => {
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    const clean = (v) => (v || "").replace(/"/g, '').replace(/,/g, '').trim();
                    return {
                        name: clean(cols[0]),
                        elo: parseInt(clean(cols[1])) || 0,
                        wins: parseInt(clean(cols[2])) || 0,
                        losses: parseInt(clean(cols[3])) || 0
                    };
                });
            } catch (e) { console.error(e); }
        }

        function searchPlayer(event) {
            if (event) event.preventDefault();
            const input = document.getElementById('searchInput').value.toLowerCase().trim();
            const resultDiv = document.getElementById('searchResult');
            const found = players.find(p => p.name.toLowerCase().includes(input));
            if (found) {
                resultDiv.innerHTML = `
                    <h3 class="text-xl font-bold text-blue-800">${found.name}</h3>
                    <div class="mt-2 grid grid-cols-3 gap-4 text-sm">
                        <div><p class="text-slate-500 font-bold uppercase text-[10px]">Elo</p><p class="text-lg font-bold text-blue-600">${found.elo}</p></div>
                        <div><p class="text-slate-500 font-bold uppercase text-[10px]">Wins</p><p class="text-lg font-bold text-green-600">${found.wins}</p></div>
                        <div><p class="text-slate-500 font-bold uppercase text-[10px]">Losses</p><p class="text-lg font-bold text-red-500">${found.losses}</p></div>
                    </div>`;
                resultDiv.classList.remove('hidden');
            } else { resultDiv.classList.add('hidden'); }
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('searchForm').addEventListener('submit', searchPlayer);
            loadData();
        });
    </script>
</body>
</html>
