<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBHS Table Tennis Club - Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-900 font-sans min-h-screen">

    <nav class="bg-blue-800 text-white p-4 shadow-md">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <a href="index.html" class="text-xl font-bold">NBHS TT Hub</a>
            <div class="space-x-4 text-sm md:text-base">
                <a href="player-ranking.html" class="hover:text-blue-200 uppercase font-semibold">Ranking</a>
                <a href="player-matchup-ladder.html" class="hover:text-blue-200 uppercase font-semibold">Matchup Ladder</a>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-6">
        <section class="space-y-8">
            <div class="text-center py-10">
                <h1 class="text-4xl font-extrabold text-blue-900">Welcome, Players.</h1>
                <p class="text-slate-600 mt-2">Access the official Normanhurst Boys Table Tennis ranking system.</p>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <h2 class="text-lg font-bold mb-4">🔍 Quick Player Search</h2>
                <form id="searchForm" class="flex gap-2">
                    <input type="text" id="searchInput" placeholder="Enter name (e.g. Fanda)..." 
                        class="flex-1 p-3 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                    <button type="submit" class="bg-blue-600 text-white px-6 py-3 rounded-xl font-bold">Search</button>
                </form>
                <div id="searchResult" class="hidden mt-6 p-4 bg-blue-50 border border-blue-100 rounded-xl"></div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <a href="player-ranking.html" class="bg-white p-8 rounded-2xl border hover:border-blue-500 transition-all shadow-sm text-center">
                    <span class="text-3xl mb-2 block">🏆</span>
                    <h3 class="font-bold text-xl">View Ranking Ladder</h3>
                    <p class="text-slate-500 text-sm">Check current Elo ratings and club standings.</p>
                </a>
                <a href="player-matchup-ladder.html" class="bg-white p-8 rounded-2xl border hover:border-blue-500 transition-all shadow-sm text-center">
                    <span class="text-3xl mb-2 block">📅</span>
                    <h3 class="font-bold text-xl">Weekly Matchups</h3>
                    <p class="text-slate-500 text-sm">See bracket placements for the next session.</p>
                </a>
            </div>
        </section>
    </main>

    <script>
// Paste your "Published to Web" CSV link for the STATS tab here
const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ_UHoHNgToKV4yCuB_M56029JuMrOYWN-VkyxDiWkwXHJI1hhRnon_GMnvgvmQeHmL4F0gxkVz7IMP/pub?output=csv&gid=2082256240";

let players = [];

async function loadData() {
    try {
        const response = await fetch(SHEET_URL);
        const data = await response.text();
        
        // Split by line and filter out any empty lines
        const rows = data.split('\n').map(row => row.trim()).filter(row => row.length > 0);
        
        // Skip the header row (Name, ELO, Stats)
        const playerRows = rows.slice(1); 

        players = playerRows.map(row => {
            // This regex handles CSV splitting even if there are commas inside quotes
            const columns = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
            
            const rawElo = columns[1] ? columns[1].replace(/"/g, '').replace(/,/g, '').trim() : "0";
            const rawWins = columns[2] ? columns[2].replace(/"/g, '').trim() : "0";
            const rawLosses = columns[3] ? columns[3].replace(/"/g, '').trim() : "0";
            return { 
                name: columns[0] ? columns[0].replace(/"/g, '').trim() : "Unknown", 
                elo: parseInt(rawElo) || 0,
                wins: parseInt(rawWins) || 0,
                losses: parseInt(rawLosses) || 0
            };
        });

        console.log("Successfully loaded " + players.length + " players.");
        
        // If you are on index.html, we don't need to load the table.
        // If you want to use this same script for player-ranking.html, 
        // you would call your table-filling function here.
        if (document.getElementById('ladder-table')) {
            renderLadder();
        }
        
    } catch (error) {
        console.error("Error loading Google Sheet:", error);
    }
}

function renderLadder() {
    const table = document.getElementById('ladder-table');
    if (!table) return;
    
    table.innerHTML = ""; // Clear existing
    // Sort by ELO high to low
    players.sort((a,b) => b.elo - a.elo).forEach((p, i) => {
        table.innerHTML += `
            <tr class="border-t">
                <td class="p-4 font-bold text-slate-400">#${i+1}</td>
                <td class="p-4 font-semibold">${p.name}</td>
                <td class="p-4 text-right font-mono text-blue-600 font-bold">${p.elo}</td>
            </tr>
        `;
    });
}

// Search Function for the Home Page
function searchPlayer(event) {
    if (event) event.preventDefault();
    const input = document.getElementById('searchInput').value.toLowerCase().trim();
    const resultDiv = document.getElementById('searchResult');
    
    if (input === "") {
        resultDiv.classList.add('hidden');
        return;
    }

    if (!players.length) {
        resultDiv.innerHTML = `<p class="text-slate-600">Player data is still loading. Please wait a moment and try again.</p>`;
        resultDiv.classList.remove('hidden');
        return;
    }

    const found = players.find(p => p.name.toLowerCase().includes(input));

    if (found) {
        resultDiv.innerHTML = `
            <h3 class="text-xl font-bold text-blue-800">${found.name}</h3>
            <div class="mt-2 grid grid-cols-3 gap-4 text-sm">
                <div><p class="text-slate-500 uppercase text-xs font-bold">Elo</p><p class="text-lg font-mono font-bold text-blue-600">${found.elo}</p></div>
                <div><p class="text-slate-500 uppercase text-xs font-bold">Wins</p><p class="text-lg font-bold text-green-600">${found.wins ?? 'N/A'}</p></div>
                <div><p class="text-slate-500 uppercase text-xs font-bold">Losses</p><p class="text-lg font-bold text-red-500">${found.losses ?? 'N/A'}</p></div>
            </div>
        `;
        resultDiv.classList.remove('hidden');
    } else {
        resultDiv.innerHTML = `<p class="text-slate-600">No player found. Try another name.</p>`;
        resultDiv.classList.remove('hidden');
    }
}

document.addEventListener('DOMContentLoaded', () => {
    const searchForm = document.getElementById('searchForm');
    if (searchForm) {
        searchForm.addEventListener('submit', searchPlayer);
    }
    loadData();
});
    </script>
</body>
</html>
