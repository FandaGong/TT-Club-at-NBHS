<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBHS Table Tennis Club - Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-900 font-sans min-h-screen">

    <nav class="bg-blue-800 text-white p-4 shadow-md">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <a href="index.html" class="text-xl font-bold">NBHS TT Hub</a>
            <div class="space-x-4 text-sm md:text-base">
                <a href="player-ranking.html" class="hover:text-blue-200 uppercase font-semibold">Ranking</a>
                <a href="player-matchup-ladder.html" class="hover:text-blue-200 uppercase font-semibold">Matchup Ladder</a>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-6">
        <section class="space-y-8">
            <div class="text-center py-10">
                <h1 class="text-4xl font-extrabold text-blue-900">Welcome, Players.</h1>
                <p class="text-slate-600 mt-2">Access the official Normanhurst Boys Table Tennis ranking system.</p>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <h2 class="text-lg font-bold mb-4">🔍 Quick Player Search</h2>
                <div class="flex gap-2">
                    <input type="text" id="searchInput" placeholder="Enter name (e.g. Fanda)..." 
                        class="flex-1 p-3 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                    <button onclick="searchPlayer()" class="bg-blue-600 text-white px-6 py-3 rounded-xl font-bold">Search</button>
                </div>
                <div id="searchResult" class="hidden mt-6 p-4 bg-blue-50 border border-blue-100 rounded-xl"></div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <a href="player-ranking.html" class="bg-white p-8 rounded-2xl border hover:border-blue-500 transition-all shadow-sm text-center">
                    <span class="text-3xl mb-2 block">🏆</span>
                    <h3 class="font-bold text-xl">View Ranking Ladder</h3>
                    <p class="text-slate-500 text-sm">Check current Elo ratings and club standings.</p>
                </a>
                <a href="player-matchup-ladder.html" class="bg-white p-8 rounded-2xl border hover:border-blue-500 transition-all shadow-sm text-center">
                    <span class="text-3xl mb-2 block">📅</span>
                    <h3 class="font-bold text-xl">Weekly Matchups</h3>
                    <p class="text-slate-500 text-sm">See bracket placements for the next session.</p>
                </a>
            </div>
        </section>
    </main>

    <script>
        const players = [
            { name: "Fanda Gong", elo: 1450, stats: "W: 12 | L: 2" },
            { name: "Alex Smith", elo: 1320, stats: "W: 8 | L: 5" },
            { name: "Julian Wong", elo: 1280, stats: "W: 7 | L: 6" }
        ];

        function searchPlayer() {
            const input = document.getElementById('searchInput').value.toLowerCase();
            const resultDiv = document.getElementById('searchResult');
            const found = players.find(p => p.name.toLowerCase().includes(input));

            if (found && input !== "") {
                resultDiv.innerHTML = `
                    <h3 class="text-xl font-bold text-blue-800">${found.name}</h3>
                    <p class="text-slate-700"><strong>Rating:</strong> ${found.elo}</p>
                    <p class="text-slate-700"><strong>History:</strong> ${found.stats}</p>
                `;
                resultDiv.classList.remove('hidden');
            } else {
                alert("Player not found!");
            }
        }
    </script>
</body>
</html>
