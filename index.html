<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBHS Table Tennis Club - Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/png" href="favicon.png">
    <h1 class="text-6xl text-slate-900 mb-2">Official Rankings</h1>
    <style>
        /* Bolder, more "League" style UI */
        .league-header {
            background: linear-gradient(90deg, #1e3a8a 0%, #1e40af 100%);
            border-bottom: 4px solid #fbbf24;
            /* Gold highlight */
        }

        .stat-card {
            border: 2px solid #e2e8f0;
            border-left: 6px solid #1e3a8a;
            /* Strong accent line */
            border-radius: 4px;
            /* Less rounded, more "rugged" */
        }

        .btn-search {
            background-color: #1e3a8a;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .btn-search:hover {
            background-color: #fbbf24;
            color: #1e3a8a;
        }

        .last-updated {
            font-size: 0.75rem;
            color: #64748b;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.05em;
        }
    </style>
    <section class="bg-white border-4 border-slate-900 shadow-[10px_10px_0px_0px_rgba(30,58,138,1)] p-8 mt-6">
        <h1 class="text-6xl text-slate-900">Player Database</h1>
        <p class="text-slate-500 font-bold mb-8 tracking-tighter">LIVE ELO ENGINE // TERM 2 STATUS</p>

        <h2 class="text-2xl text-blue-800 mb-4">Quick Search</h2>
        <form id="searchForm" class="flex flex-col sm:flex-row">
        </form>
    </section>
</head>

<body class="bg-slate-50 text-slate-900 font-sans min-h-screen">

    <nav class="league-header text-white p-4 shadow-xl">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <span class="text-2xl">🏓</span>
                <a href="index.html" class="text-xl font-black italic tracking-tighter uppercase">NBHS TT HUB</a>
            </div>
            <div class="space-x-6 text-xs font-bold uppercase tracking-widest">
                <a href="player-ranking.html" class="hover:text-yellow-400">Rankings</a>
                <a href="player-matchup-ladder.html" class="hover:text-yellow-400">Matchups</a>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-6">
        <section class="bg-white border-4 border-slate-900 shadow-[10px_10px_0px_0px_rgba(30,58,138,1)] p-8 mb-10 mt-6">
            <h1 class="text-5xl font-black text-slate-900 italic uppercase mb-2 leading-none">Player Database</h1>
            <p class="text-slate-500 font-bold mb-8 tracking-tighter">LIVE ELO ENGINE // TERM 2 STATUS</p>

            <form id="searchForm" class="flex flex-col sm:flex-row">
                <input type="text" id="searchInput" placeholder="ENTER PLAYER NAME..."
                    class="flex-1 p-4 border-4 border-slate-900 outline-none focus:bg-yellow-50 font-black uppercase placeholder:text-slate-300">
                <button type="submit"
                    class="btn-search text-white px-10 py-4 font-black border-4 border-slate-900 sm:border-l-0 bg-blue-800 hover:bg-yellow-400 hover:text-blue-900 transition-colors">
                    SEARCH
                </button>
            </form>
            <div id="searchResult"
                class="hidden mt-8 bg-slate-50 border-4 border-slate-900 p-6 shadow-[4px_4px_0px_0px_rgba(0,0,0,1)]">
            </div>
        </section>

        <footer class="mt-20 border-t-4 border-slate-900 pt-6 mb-10">
            <div class="flex flex-col md:flex-row justify-between items-center gap-4">
                <p class="last-updated">System Status: <span class="text-green-600">● Operational</span></p>
                <p id="update-timestamp" class="last-updated">Last Updated: Syncing...</p>
            </div>
        </footer>
    </main>

    <script>
        // Paste your "Published to Web" CSV link for the PLAYERS tab here
        const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ_UHoHNgToKV4yCuB_M56029JuMrOYWN-VkyxDiWkwXHJI1hhRnon_GMnvgvmQeHmL4F0gxkVz7IMP/pub?output=csv&gid=2082256240";

        let players = [];

        async function loadData() {
            try {
                const response = await fetch(SHEET_URL);
                const data = await response.text();

                // Split by line and filter out any empty lines
                const rows = data.split('\n').map(row => row.trim()).filter(row => row.length > 0);

                // Skip the header row
                const playerRows = rows.slice(1);

                players = playerRows.map(row => {
                    // This regex handles CSV splitting even if there are commas inside quotes
                    const columns = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);

                    // Helper to strip quotes, commas, and whitespace
                    const clean = (val) => (val || "").replace(/"/g, '').replace(/,/g, '').trim();

                    return {
                        name: clean(columns[0]) || "Unknown",
                        elo: parseInt(clean(columns[1])) || 0,
                        wins: parseInt(clean(columns[2])) || 0,
                        losses: parseInt(clean(columns[3])) || 0
                    };
                });

                console.log("Successfully loaded " + players.length + " players.");

                // --- NEW: UPDATE THE TIMESTAMP ---
                const now = new Date();
                const timeString = now.toLocaleDateString('en-AU', {
                    day: 'numeric',
                    month: 'short',
                    hour: '2-digit',
                    minute: '2-digit'
                });
                const updateEl = document.getElementById('update-timestamp');
                if (updateEl) {
                    updateEl.innerText = "Last Sync: " + timeString + " AEST";
                }
                // ---------------------------------

            } catch (error) {
                console.error("Error loading Google Sheet:", error);
            }
        }

        // Search Function for the Home Page
        function searchPlayer(event) {
            if (event) event.preventDefault();
            const input = document.getElementById('searchInput').value.toLowerCase().trim();
            const resultDiv = document.getElementById('searchResult');

            if (input === "") {
                resultDiv.classList.add('hidden');
                return;
            }

            if (!players.length) {
                resultDiv.innerHTML = `<p class="text-slate-600 italic">Data is still loading from the sheet...</p>`;
                resultDiv.classList.remove('hidden');
                return;
            }

            const found = players.find(p => p.name.toLowerCase().includes(input));

            if (found) {
                resultDiv.innerHTML = `
            <h3 class="text-xl font-bold text-blue-800">${found.name}</h3>
            <div class="mt-4 grid grid-cols-3 gap-4 text-center">
                <div class="bg-white p-2 rounded-lg shadow-sm border border-blue-100">
                    <p class="text-slate-500 uppercase text-[10px] font-bold tracking-widest">Elo</p>
                    <p class="text-lg font-mono font-bold text-blue-600">${found.elo}</p>
                </div>
                <div class="bg-white p-2 rounded-lg shadow-sm border border-green-100">
                    <p class="text-slate-500 uppercase text-[10px] font-bold tracking-widest">Wins</p>
                    <p class="text-lg font-bold text-green-600">${found.wins}</p>
                </div>
                <div class="bg-white p-2 rounded-lg shadow-sm border border-red-100">
                    <p class="text-slate-500 uppercase text-[10px] font-bold tracking-widest">Losses</p>
                    <p class="text-lg font-bold text-red-500">${found.losses}</p>
                </div>
            </div>
        `;
                resultDiv.classList.remove('hidden');
            } else {
                resultDiv.innerHTML = `<p class="text-slate-600 p-2">Player "<strong>${input}</strong>" not found.</p>`;
                resultDiv.classList.remove('hidden');
            }
        }

        // Initialize when page loads
        document.addEventListener('DOMContentLoaded', () => {
            const searchForm = document.getElementById('searchForm');
            if (searchForm) {
                searchForm.addEventListener('submit', searchPlayer);
            }
            loadData();
        });
    </script>
</body>

</html>
