<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match History - NBHS Table Tennis Club</title>
    <script src="tailwind-theme.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="animations.css">
    <link rel="icon" type="image/png" href="favicon.png">
</head>

<body class="site-surface text-slate-900 font-sans min-h-screen flex flex-col">

    <!-- 1. HEADER PLACEHOLDER -->
    <div id="header-placeholder"></div>

    <!-- 2. MAIN -->
    <main id="main-content" class="site-shell max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-6 flex-grow w-full opacity-0 transition-opacity duration-500">
        <section class="space-y-6">
            <!-- Hero -->
            <div class="page-hero text-left py-8 px-4 sm:px-8 fade-up">
                <div class="max-w-2xl">
                    <h1 class="page-hero-title text-3xl sm:text-4xl font-extrabold">Match History</h1>
                    <p class="page-hero-copy mt-2 text-sm sm:text-base">Browse and search the club's match history.</p>
                </div>
            </div>

            <!-- Filters -->
            <div class="form-shell p-5 fade-up-d1">
                <div class="flex items-center justify-between mb-3 gap-3">
                    <h2 class="section-heading text-sm">Filters</h2>
                    <button id="resetFiltersBtn" type="button" class="text-xs font-semibold text-red-700 hover:text-red-800 hover:underline transition-colors">Clear filters</button>
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2" for="matchTermWeekFilterPublic">Term & Week</label>
                        <select id="matchTermWeekFilterPublic" class="compact-select w-full p-3 rounded-lg outline-none focus:ring-2 focus:ring-red-500">
                            <option value="">All terms & weeks</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2" for="matchPlayerFilterPublic">Player</label>
                        <input type="search" id="matchPlayerFilterPublic" placeholder="Search by player name…" class="compact-input w-full p-3 rounded-lg outline-none focus:ring-2 focus:ring-red-500">
                    </div>
                </div>
                <button id="loadPublicMatchesBtn" type="button" class="w-full mt-4 bg-red-700 text-white px-4 py-2.5 rounded-lg font-semibold btn-hover">Load Matches</button>
            </div>

            <!-- Status & Error -->
            <div id="matchesStatusPublic" class="text-center text-slate-600 text-sm fade-up-d2"></div>
            <div id="matchesErrorPublic" class="text-center text-red-600 text-sm hidden" role="alert"></div>

            <!-- Loading skeleton -->
            <div id="matchesSkeletonPublic" class="space-y-3 hidden">
                <div class="match-card p-4 rounded-lg animate-pulse"><div class="h-4 bg-slate-200 rounded w-3/5 mb-2"></div><div class="h-3 bg-slate-100 rounded w-4/5"></div></div>
                <div class="match-card p-4 rounded-lg animate-pulse"><div class="h-4 bg-slate-200 rounded w-2/5 mb-2"></div><div class="h-3 bg-slate-100 rounded w-3/5"></div></div>
                <div class="match-card p-4 rounded-lg animate-pulse"><div class="h-4 bg-slate-200 rounded w-1/2 mb-2"></div><div class="h-3 bg-slate-100 rounded w-3/4"></div></div>
            </div>

            <!-- Matches List -->
            <div id="matchesListPublic" class="space-y-3 fade-up-d3"></div>
        </section>
    </main>

    <!-- Confirm Delete Modal -->
    <div id="deleteModal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/30 backdrop-blur-sm" role="dialog" aria-modal="true" aria-labelledby="deleteModalTitle">
        <div class="bg-white rounded-xl shadow-xl max-w-sm w-full mx-4 p-6 fade-in">
            <h3 id="deleteModalTitle" class="text-lg font-bold text-slate-900">Delete match</h3>
            <p class="text-sm text-slate-600 mt-2">This will permanently remove this match from the records. This cannot be undone.</p>
            <div class="flex justify-end gap-3 mt-6">
                <button id="deleteModalCancel" type="button" class="px-4 py-2 text-sm font-semibold text-slate-700 bg-slate-100 hover:bg-slate-200 rounded-lg transition-colors">Cancel</button>
                <button id="deleteModalConfirm" type="button" class="px-4 py-2 text-sm font-semibold text-white bg-red-700 hover:bg-red-800 rounded-lg btn-hover">Delete</button>
            </div>
        </div>
    </div>

    <!-- 3. FOOTER PLACEHOLDER -->
    <div id="footer-placeholder"></div>

    <script src="components.js"></script>
    <script>
        let _supabase;
        let _currentSession = null;
        let _userRole = 'standard';
        let _pendingDeleteId = null;

        // --- Toast-like confirmation ---
        function showToast(message, type) {
            const existing = document.getElementById('toastMsg');
            if (existing) existing.remove();
            const t = document.createElement('div');
            t.id = 'toastMsg';
            t.className = 'fixed bottom-6 left-1/2 -translate-x-1/2 z-50 px-5 py-3 rounded-lg text-sm font-semibold shadow-lg fade-up ' +
                (type === 'success' ? 'bg-green-700 text-white' : 'bg-red-700 text-white');
            t.textContent = message;
            document.body.appendChild(t);
            setTimeout(() => { t.style.opacity = '0'; t.style.transition = 'opacity 0.3s'; setTimeout(() => t.remove(), 300); }, 3000);
        }

        // --- Show/hide skeleton ---
        function setLoading(loading) {
            const skel = document.getElementById('matchesSkeletonPublic');
            const list = document.getElementById('matchesListPublic');
            skel.classList.toggle('hidden', !loading);
            if (loading) list.innerHTML = '';
        }

        function showError(msg) {
            const err = document.getElementById('matchesErrorPublic');
            err.textContent = msg;
            err.classList.remove('hidden');
        }

        function hideError() {
            document.getElementById('matchesErrorPublic').classList.add('hidden');
        }

        async function initMatches() {
            _supabase = window._supabaseClient;
            if (!_supabase) return;

            const { data } = await _supabase.auth.getSession();
            _currentSession = data.session;

            if (_currentSession && _currentSession.user && _currentSession.user.email) {
                const email = (_currentSession.user.email || '').toLowerCase();
                if (window._resolveAccountRole) {
                    _userRole = await window._resolveAccountRole(email);
                }
            }

            await loadTermWeekOptions();
            // Load all matches on initial visit
            loadPublicMatches();
        }

        async function loadTermWeekOptions() {
            const statusNode = document.getElementById('matchesStatusPublic');
            const filterSelect = document.getElementById('matchTermWeekFilterPublic');
            if (statusNode) statusNode.textContent = 'Loading filter options…';

            try {
                const { data, error } = await _supabase.from('match_history').select('term_and_week').order('term_and_week', { ascending: false });
                if (error) throw error;

                const termWeeks = [...new Set((data || []).map(m => m.term_and_week).filter(Boolean))].sort().reverse();
                if (filterSelect && termWeeks.length > 0) {
                    filterSelect.innerHTML = '<option value="">All terms & weeks</option>' + termWeeks.map(tw => `<option value="${tw}">${tw}</option>`).join('');
                }
                if (statusNode) statusNode.textContent = '';
            } catch (error) {
                if (statusNode) statusNode.textContent = 'Could not load filter options.';
            }
        }

        async function loadPublicMatches() {
            const statusNode = document.getElementById('matchesStatusPublic');
            const listNode = document.getElementById('matchesListPublic');
            const filterTermWeek = document.getElementById('matchTermWeekFilterPublic')?.value || '';
            const filterPlayer = document.getElementById('matchPlayerFilterPublic')?.value.toLowerCase().trim() || '';

            hideError();
            setLoading(true);
            if (statusNode) statusNode.textContent = '';

            try {
                let query = _supabase.from('match_history').select('id,player_1,player_2,winner,score,division,half,term_and_week,created_at').order('created_at', { ascending: false });

                if (filterTermWeek) {
                    query = query.eq('term_and_week', filterTermWeek);
                }

                const { data, error } = await query;
                if (error) throw error;

                let matches = (data || []);

                // Client-side player filter
                if (filterPlayer) {
                    matches = matches.filter(m => {
                        const p1 = (m.player_1 || '').toLowerCase();
                        const p2 = (m.player_2 || '').toLowerCase();
                        return p1.includes(filterPlayer) || p2.includes(filterPlayer);
                    });
                }

                setLoading(false);

                if (matches.length === 0) {
                    const hint = filterPlayer || filterTermWeek ? 'Try a different search or clear your filters.' : 'No matches have been recorded yet.';
                    if (listNode) {
                        listNode.innerHTML = `<div class="text-center py-10 text-slate-500"><p class="text-base font-semibold text-slate-600">No matches found</p><p class="text-sm mt-1">${hint}</p></div>`;
                    }
                    if (statusNode) statusNode.textContent = '';
                    return;
                }

                if (listNode) {
                    listNode.innerHTML = matches.map(m => {
                        const loser = m.player_1 === m.winner ? m.player_2 : m.player_1;
                        const deleteBtn = _userRole === 'admin' ? `<button class="match-delete-btn-public flex-shrink-0 text-xs font-bold uppercase px-2.5 py-1 rounded bg-red-100 text-red-700 hover:bg-red-200 active:bg-red-300 transition-colors whitespace-nowrap" data-id="${m.id}">Delete</button>` : '';

                        return `
                            <div class="match-card rounded-lg border border-slate-200 bg-white p-4 flex items-start justify-between gap-3 card-hover">
                                <div class="min-w-0 flex-grow">
                                    <p class="text-sm font-bold text-slate-900">${m.winner} <span class="font-normal text-slate-500">beat</span> ${loser}</p>
                                    <div class="flex flex-wrap gap-x-3 gap-y-0.5 mt-1.5 text-xs text-slate-500">
                                        <span>Score: ${m.score || '—'}</span>
                                        <span>${m.division || '—'}${m.half ? ' ' + m.half : ''}</span>
                                        <span class="font-medium text-slate-600">${m.term_and_week || '—'}</span>
                                    </div>
                                    <p class="text-[11px] text-slate-400 mt-1.5">${new Date(m.created_at).toLocaleString()}</p>
                                </div>
                                ${deleteBtn}
                            </div>
                        `;
                    }).join('');

                    // Wire delete buttons only for admins
                    if (_userRole === 'admin') {
                        listNode.querySelectorAll('.match-delete-btn-public').forEach(btn => btn.addEventListener('click', () => openDeleteModal(btn.dataset.id)));
                    }
                }
                if (statusNode) statusNode.textContent = `${matches.length} match${matches.length !== 1 ? 'es' : ''}`;
            } catch (error) {
                setLoading(false);
                showError(`Could not load matches: ${error.message}`);
                if (statusNode) statusNode.textContent = '';
            }
        }

        // --- Custom delete modal ---
        function openDeleteModal(matchId) {
            _pendingDeleteId = matchId;
            document.getElementById('deleteModal').classList.remove('hidden');
            document.getElementById('deleteModal').classList.add('flex');
        }

        function closeDeleteModal() {
            _pendingDeleteId = null;
            const m = document.getElementById('deleteModal');
            m.classList.add('hidden');
            m.classList.remove('flex');
        }

        async function confirmDeleteMatch() {
            const matchId = _pendingDeleteId;
            closeDeleteModal();
            if (!matchId) return;

            try {
                const { error } = await _supabase.rpc('delete_match', { p_match_id: matchId });
                if (error) throw error;
                showToast('Match deleted', 'success');
                await loadPublicMatches();
            } catch (error) {
                showToast(`Failed to delete match: ${error.message}`, 'error');
            }
        }

        function resetFilters() {
            document.getElementById('matchTermWeekFilterPublic').value = '';
            document.getElementById('matchPlayerFilterPublic').value = '';
            loadPublicMatches();
        }

        // --- Event listeners ---
        document.getElementById('loadPublicMatchesBtn')?.addEventListener('click', loadPublicMatches);
        document.getElementById('resetFiltersBtn')?.addEventListener('click', resetFilters);
        document.getElementById('deleteModalCancel')?.addEventListener('click', closeDeleteModal);
        document.getElementById('deleteModalConfirm')?.addEventListener('click', confirmDeleteMatch);
        document.getElementById('deleteModal')?.addEventListener('click', (e) => { if (e.target === e.currentTarget) closeDeleteModal(); });

        // Auto-load on filter change
        document.getElementById('matchTermWeekFilterPublic')?.addEventListener('change', loadPublicMatches);

        let _searchTimer;
        document.getElementById('matchPlayerFilterPublic')?.addEventListener('input', () => {
            clearTimeout(_searchTimer);
            _searchTimer = setTimeout(loadPublicMatches, 300);
        });

        // Cancel pending delete on Escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && _pendingDeleteId) closeDeleteModal();
        });

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', initMatches);
    </script>
</body>

</html>
