<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBHS Table Tennis Club - Rules</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css?v=20260713m">
    <link rel="stylesheet" href="animations.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="icon" type="image/png" href="favicon.png">
</head>

<body class="site-surface text-slate-900 font-sans min-h-screen flex flex-col">
        <div id="header-placeholder"></div>

    <main id="main-content" class="almanac flex-grow w-full opacity-0 transition-opacity duration-300">
      <div class="alm-shell">
        <header class="alm-masthead--compact alm-block" style="border-bottom:2px solid var(--ink);padding-bottom:1.25rem;">
            <div>
                <p class="alm-kicker">Official guidelines</p>
                <h1 class="alm-display alm-display--md mt-3">Rules &amp;<br>Regulations</h1>
            </div>
        </header>

        <section class="alm-block">
            <!-- All Rules Loaded from Database -->
            <div id="custom-rules-container" class="space-y-4"></div>

            <!-- Admin Editor -->
            <div id="admin-form-container" class="hidden alm-panel" style="margin-top:2rem;">
                <div class="alm-toggle mb-6">
                    <button type="button" id="mode-form-btn" onclick="switchMode('form')" class="is-active">Form Mode</button>
                    <button type="button" id="mode-text-btn" onclick="switchMode('text')">Text Editor</button>
                </div>

                <div id="form-mode">
                    <div class="alm-rule-head"><h3 id="form-container-title" class="alm-section-title" style="font-size:1.2rem;">Add a Club Rule</h3></div>
                    <p id="form-container-subtitle" class="alm-mh-date" style="margin-bottom:1.25rem;">Changes made here sync instantly to the club database.</p>
                    <form id="add-rule-form" class="space-y-4">
                        <div>
                            <label class="alm-field-label">Rule Title</label>
                            <input type="text" id="rule-title" placeholder="e.g., Conduct" required class="alm-input">
                        </div>
                        <div>
                            <label class="alm-field-label">Outline Level</label>
                            <select id="rule-level" class="alm-select">
                                <option value="1">Section (Header)</option>
                                <option value="2">Sub-rule (1.1)</option>
                                <option value="3">Detail (1.1.1)</option>
                            </select>
                        </div>
                        <div id="desc-container">
                            <label class="alm-field-label">Description</label>
                            <textarea id="rule-desc" rows="3" required class="alm-input"></textarea>
                        </div>
                        <div class="flex gap-3 pt-2">
                            <button type="submit" id="submit-btn" class="alm-btn">Add Rule</button>
                            <button type="button" id="cancel-edit-btn" class="hidden alm-btn alm-btn--ghost" onclick="cancelEdit()">Cancel</button>
                        </div>
                    </form>
                </div>

                <div id="text-mode" class="hidden">
                    <div class="alm-rule-head"><h3 class="alm-section-title" style="font-size:1.2rem;">Bulk Text Editor</h3></div>
                    <textarea id="text-editor" rows="15" class="alm-input" style="font-family:var(--font-mono);font-size:0.82rem;line-height:1.6;" spellcheck="false"></textarea>
                    <div class="flex items-center gap-4 mt-6">
                        <button type="button" id="save-text-btn" onclick="saveTextRules()" class="alm-btn">Save All Changes</button>
                        <span id="text-save-status" class="alm-eyebrow"></span>
                    </div>
                </div>
            </div>
        </section>
      </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="components.js?v=20260713m"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = "https://ngnkbfazhdedaqvxcphw.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5nbmtiZmF6aGRlZGFxdnhjcGh3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MTE5NDksImV4cCI6MjA5MzI4Nzk0OX0.F_S6ORkFe-SuJPybs7FEFH94E6U2hZ5ern4vrg4kMOk";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const ADMIN_ALLOWLIST = ['nbhsttclub@gmail.com', 'jonathanzhao111@gmail.com', 'damon.yuan@education.nsw.gov.au'];
        const ACCOUNT_REQUESTS_TABLES = ['account_requests_v2', 'account_requests'];

        const container = document.getElementById('custom-rules-container');
        let customRules = [];
        let isAdmin = false;
        let editingRuleId = null;
        let rulesLoaded = false;
        let rulesLoadMessage = '';

        async function resolveAccountRole(email, accountId) {
            if (ADMIN_ALLOWLIST.includes((email || '').toLowerCase())) return 'admin';

            if (accountId) {
                const { data, error } = await _supabase
                    .from('account')
                    .select('role, status')
                    .eq('account_id', accountId)
                    .maybeSingle();
                if (!error && data && (data.status || 'active').toLowerCase() === 'active') {
                    return (data.role || 'standard').toLowerCase();
                }
            }

            if (email) {
                const { data, error } = await _supabase
                    .from('account')
                    .select('role, status')
                    .ilike('email', email)
                    .maybeSingle();
                if (!error && data && (data.status || 'active').toLowerCase() === 'active') {
                    return (data.role || 'standard').toLowerCase();
                }
            }

            for (const tableName of ACCOUNT_REQUESTS_TABLES) {
                const { data, error } = await _supabase
                    .from(tableName)
                    .select('role, status')
                    .ilike('email', email)
                    .order('created_at', { ascending: false })
                    .limit(1);
                if (!error) {
                    const request = data && data[0];
                    if (!request) continue;
                    if ((request.status || '').toLowerCase() === 'approved') {
                        return (request.role || 'standard').toLowerCase();
                    }
                    continue;
                }
                const code = (error?.code || '').toUpperCase();
                const message = (error?.message || '').toLowerCase();
                const missingTable = code === '42P01' || code === 'PGRST205' || (message.includes('relation') && message.includes('account_requests') && message.includes('does not exist'));
                const permissionDenied = code === '42501' || message.includes('permission denied') || message.includes('row-level security policy');
                if (!missingTable && !permissionDenied) {
                    break;
                }
            }
            return 'standard';
        }

        window._resolveAccountRole = resolveAccountRole;

        function escapeHtml(value) {
            return String(value || '').replace(/[&<>"']/g, character => ({
                '&': '&',
                '<': '<',
                '>': '>',
                '"': '"',
                "'": '&#39;'
            }[character]));
        }

        // Reveal logic
        function revealPage() {
            document.getElementById('main-content').classList.remove('opacity-0');
            document.getElementById('page-footer').classList.remove('opacity-0');
        }

        // Mode Switching
        window.switchMode = function (mode) {
            const formMode = document.getElementById('form-mode'), textMode = document.getElementById('text-mode');
            const formBtn = document.getElementById('mode-form-btn'), textBtn = document.getElementById('mode-text-btn');
            if (mode === 'text') {
                formMode.classList.add('hidden'); textMode.classList.remove('hidden');
                formBtn.classList.remove('is-active'); textBtn.classList.add('is-active');
                document.getElementById('text-editor').value = rulesToText(customRules);
            } else {
                textMode.classList.add('hidden'); formMode.classList.remove('hidden');
                textBtn.classList.remove('is-active'); formBtn.classList.add('is-active');
                cancelEdit();
            }
        };

        // ... Helpers (rulesToText, textToRules, encode/decode, normalize) ...
        function rulesToText(e){let t=[];for(const n of e){t.push("#".repeat(n.level||1)+" "+(n.title||"")),n.description&&t.push(n.description),t.push("")}return t.join("\n").trim()}function textToRules(e){const t=e.split("\n"),n=[];let l=null;for(const o of t){const r=o.match(/^(#{1,3})\s+(.+)$/);r?(l&&(l.description=l.description.join("\n").trim(),n.push(l)),l={title:r[2].trim(),level:r[1].length,is_section:1===r[1].length,description:[]}):l&&l.description.push(o)}return l&&(l.description=l.description.join("\n").trim(),n.push(l)),n}function encodeRuleTitle(e,t){return`[[level:${t}]]${e}`}function decodeRuleTitle(e){const t=String(e||"").match(/^\[\[level:(\d+)\]\](.*)$/);return t?{level:Math.max(1,Math.min(3,Number.parseInt(t[1],10)||1)),title:t[2]||""}:{level:1,title:String(e||"")}}function normalizeRule(e){const t=decodeRuleTitle(e.title);return{...e,title:t.title,level:t.level,is_section:1===t.level}}function buildOutlineNumber(e,t){for(let n=1;n<e;n++)t[n]||(t[n]=1);return t[e]=(t[e]||0)+1,t.fill(0,e+1),t.slice(1,e+1).join(".")}

        function renderRules(message = rulesLoadMessage) {
            container.innerHTML = '';

            if (message) {
                container.innerHTML = `
                    <div class="alm-panel fade-up">
                        <h2 class="alm-section-title" style="font-size:1.2rem;">Rules unavailable</h2>
                        <p class="mt-2 text-sm" style="color:var(--ink-soft);">${escapeHtml(message)}</p>
                    </div>
                `;
                return;
            }

            if (!customRules.length) {
                container.innerHTML = `
                    <div class="alm-panel fade-up">
                        <h2 class="alm-section-title" style="font-size:1.2rem;">No rules published yet</h2>
                        <p class="mt-2 text-sm" style="color:var(--ink-soft);">${isAdmin ? 'Use the editor below to add the first club rule.' : 'Ask a club admin to publish the current club rules.'}</p>
                    </div>
                `;
                return;
            }

            // Group rules into sections (level 1 rules with their nested level 2/3 rules)
            const sections = [];
            let currentSection = null;
            const counters = [0, 0, 0, 0];

            customRules.forEach((rule) => {
                if (rule.level === 1) {
                    currentSection = {
                        rule: rule,
                        number: buildOutlineNumber(1, counters),
                        children: []
                    };
                    sections.push(currentSection);
                } else if (currentSection) {
                    currentSection.children.push({
                        rule: rule,
                        number: buildOutlineNumber(rule.level, counters)
                    });
                }
            });

            let delay = 1;
            sections.forEach((section) => {
                const sectionDiv = document.createElement('div');
                sectionDiv.className = `alm-panel fade-up fade-up-d${Math.min(delay++, 9)}`;

                let adminHtml = isAdmin ? `<div class="flex gap-3" style="font-family:var(--font-mono);font-size:0.62rem;letter-spacing:0.12em;text-transform:uppercase;"><button onclick="editRule(${section.rule.id})" class="alm-link">Edit</button><button onclick="deleteRule(${section.rule.id})" class="alm-link" style="color:var(--oxblood);">Delete</button></div>` : '';

                let html = `<div class="flex justify-between items-start mb-3 gap-3"><h2 class="alm-section-title" style="font-size:1.4rem;"><span style="color:var(--oxblood);font-family:var(--font-mono);font-weight:700;">${section.number}.</span> ${section.rule.title}</h2>${adminHtml}</div>`;

                if (section.rule.description) {
                    html += `<p style="color:var(--ink-soft);line-height:1.6;margin-bottom:1rem;">${section.rule.description}</p>`;
                }

                // Add nested rules with indentation
                if (section.children.length > 0) {
                    html += '<div class="rule-children space-y-4 mt-4">';
                    section.children.forEach((child) => {
                        const childLevel = child.rule.level;
                        const levelClass = childLevel === 2 ? 'level-2' : 'level-3';
                        const childAdminHtml = isAdmin ? `<div class="flex gap-3" style="font-family:var(--font-mono);font-size:0.6rem;letter-spacing:0.12em;text-transform:uppercase;"><button onclick="editRule(${child.rule.id})" class="alm-link">Edit</button><button onclick="deleteRule(${child.rule.id})" class="alm-link" style="color:var(--oxblood);">Delete</button></div>` : '';

                        html += `<div class="rule-child ${levelClass}">`;
                        html += `<div class="flex justify-between items-start mb-1 gap-3"><h3 style="font-weight:700;color:var(--ink);"><span style="font-family:var(--font-mono);color:var(--ink-faint);font-weight:700;margin-right:0.4rem;">${child.number}</span>${child.rule.title}</h3>${childAdminHtml}</div>`;
                        if (child.rule.description) {
                            html += `<p style="font-size:0.9rem;color:var(--ink-soft);line-height:1.6;">${child.rule.description}</p>`;
                        }
                        html += '</div>';
                    });
                    html += '</div>';
                }

                sectionDiv.innerHTML = html;
                container.appendChild(sectionDiv);
            });
        }

        async function loadRules() {
            try {
                const { data, error } = await _supabase.from('custom_rules').select('*').order('id', { ascending: true });
                if (error) throw error;
                if (data) customRules = data.map(normalizeRule);
                rulesLoaded = true;
                rulesLoadMessage = '';
                renderRules();
            } catch (error) {
                console.error('Rules load error:', error);
                rulesLoaded = true;
                rulesLoadMessage = error.message || 'The club rules could not be loaded from Supabase.';
                renderRules();
            } finally {
                revealPage();
            }
        }

        // Form Submit
        document.getElementById('add-rule-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!isAdmin) {
                alert('Only admins can edit the club rules.');
                return;
            }
            const t = document.getElementById('rule-title').value, d = document.getElementById('rule-desc').value, l = parseInt(document.getElementById('rule-level').value);
            const payload = { title: encodeRuleTitle(t, l), description: d, is_section: l === 1 };
            const { error } = editingRuleId
                ? await _supabase.from('custom_rules').update(payload).eq('id', editingRuleId)
                : await _supabase.from('custom_rules').insert([payload]);
            if (error) {
                alert(`Failed to save rule: ${error.message}`);
                return;
            }
            location.reload();
        });

        window.editRule = (id) => {
            if (!isAdmin) {
                alert('Only admins can edit club rules.');
                return;
            }
            const r = customRules.find(x => x.id === id);
            editingRuleId = id;
            document.getElementById('rule-title').value = r.title;
            document.getElementById('rule-level').value = r.level;
            document.getElementById('rule-desc').value = r.description;
            document.getElementById('submit-btn').textContent = "Update Rule";
            document.getElementById('cancel-edit-btn').classList.remove('hidden');
            document.getElementById('admin-form-container').scrollIntoView({ behavior: 'smooth' });
        };

        window.cancelEdit = () => { editingRuleId = null; document.getElementById('add-rule-form').reset(); document.getElementById('cancel-edit-btn').classList.add('hidden'); document.getElementById('submit-btn').textContent = "Add Rule"; };
        
        window.deleteRule = async (id) => {
            if (!isAdmin) {
                alert('Only admins can delete club rules.');
                return;
            }
            if (confirm('Delete rule?')) {
                const { error } = await _supabase.from('custom_rules').delete().eq('id', id);
                if (error) {
                    alert(`Failed to delete rule: ${error.message}`);
                    return;
                }
                location.reload();
            }
        };

        window.saveTextRules = async function() {
            if (!isAdmin) {
                alert('Only admins can save rule changes.');
                return;
            }
            const btn = document.getElementById('save-text-btn'); btn.disabled = true;
            const parsed = textToRules(document.getElementById('text-editor').value);
            const { error: deleteError } = await _supabase.from('custom_rules').delete().gte('id', 0);
            if (deleteError) {
                alert(`Failed to clear existing rules: ${deleteError.message}`);
                btn.disabled = false;
                return;
            }
            const { error: insertError } = await _supabase.from('custom_rules').insert(parsed.map(r => ({ title: encodeRuleTitle(r.title, r.level), description: r.description, is_section: r.is_section })));
            if (insertError) {
                alert(`Failed to save rules: ${insertError.message}`);
                btn.disabled = false;
                return;
            }
            location.reload();
        };

        // Shared Logic — now uses resolveAccountRole instead of isAdminEmail
        async function updateAdminState(session) {
            if (session?.user?.email) {
                const role = await resolveAccountRole(session.user.email, session.user.id);
                isAdmin = role === 'admin';
            } else {
                isAdmin = false;
            }
            document.getElementById('admin-form-container').classList.toggle('hidden', !isAdmin);
            if (rulesLoaded) renderRules();
        }

        _supabase.auth.onAuthStateChange((_event, session) => {
            updateAdminState(session);
        });
        _supabase.auth.getSession().then(({ data }) => {
            updateAdminState(data?.session);
        });
        (function(){const t=document.getElementById("rankingNavToggle"),e=document.getElementById("rankingNavLinks"),n=document.getElementById("menu-icon"),o=document.getElementById("close-icon");if(t&&e)t.addEventListener("click",()=>{const s=e.classList.contains("hidden");s?(e.classList.remove("hidden"),e.classList.add("flex","animate-[fadeIn_0.2s_ease-in-out]"),n.classList.add("hidden"),o.classList.remove("hidden")):(e.classList.add("hidden"),n.classList.remove("hidden"),o.classList.add("hidden"))})})();
        (function(){const y=document.getElementById('current-year'); if(y) y.textContent=new Date().getFullYear();})();

        loadRules();
        // Fallback: reveal the page after 5s even if Supabase hasn't responded
        setTimeout(revealPage, 5000);
    </script>
<script>
(function() {
    if (window.__nbhsNavLoginTextInit__) return;
    window.__nbhsNavLoginTextInit__ = true;

    const profileLabel = 'Profile';
    const adminLabel = 'Admin Portal';
    const defaultLabel = 'Login';

    const loginLink = document.getElementById('navLoginLink');
    if (!loginLink) return;
    let loginText = document.getElementById('navLoginLinkText');
    if (!loginText) {
        loginText = document.createElement('span');
        loginText.id = 'navLoginLinkText';
        loginText.style.opacity = '0';
        loginText.textContent = '';
        loginLink.appendChild(loginText);
    }

    function setLabel(label) {
        loginText.textContent = label;
        loginText.style.opacity = '1';
    }

    async function updateLabel(session) {
        const email = session?.user?.email?.toLowerCase();
        if (!email) {
            setLabel(defaultLabel);
            return;
        }
        try {
            if (window._resolveAccountRole) {
                const role = await window._resolveAccountRole(email, session.user.id);
                setLabel(role === 'admin' ? adminLabel : profileLabel);
                return;
            }
        } catch (err) {
            // ignore and fallback
        }
        setLabel(defaultLabel);
    }

    // Reuse the existing _supabase client instead of creating a new one
    if (window._supabase) {
        _supabase.auth.getSession().then(({ data }) => updateLabel(data?.session)).catch(() => setLabel(defaultLabel));
        _supabase.auth.onAuthStateChange((_event, session) => updateLabel(session));
    }
})();
</script>
</body>
</html>
